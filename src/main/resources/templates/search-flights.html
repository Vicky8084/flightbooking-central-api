<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>AirNova – Search Flights</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 30%, #0f1429 60%, #050810 100%);
            position: relative;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 1s ease;
            padding: 20px;
        }

        body.loaded {
            opacity: 1;
        }

        /* ----- STARFIELD ----- */
        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #e6f2ff 60%, transparent 100%);
            border-radius: 50%;
            filter: brightness(1.2);
            will-change: transform, opacity;
        }

        .star.small { width: 1px; height: 1px; box-shadow: 0 0 2px rgba(255,255,255,0.9); }
        .star.medium { width: 2.5px; height: 2.5px; box-shadow: 0 0 4px #fff; }
        .star.large { width: 3.5px; height: 3.5px; box-shadow: 0 0 6px #fff; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .star { animation: starTwinkle 4s infinite ease-in-out; }

        .shooting-star {
            position: absolute;
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            z-index: 3;
            opacity: 0;
        }
        @keyframes shootingStar {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateX(300px) translateY(300px) rotate(45deg); opacity: 0; }
        }
        .shooting-star.active { animation: shootingStar 2s ease-out forwards; }

        /* ----- FLYING PLANES ----- */
        .flying-plane {
            position: fixed;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            z-index: 2;
            animation: fly 20s linear infinite;
            pointer-events: none;
        }
        .plane-1 { top: 20%; left: -10%; animation-delay: 0s; }
        .plane-2 { top: 70%; left: -10%; animation-delay: 10s; }
        .plane-3 { top: 40%; right: -10%; animation-direction: reverse; animation-delay: 5s; }

        @keyframes fly {
            0% { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        /* ----- LOGIN BUTTON ----- */
        .login-container {
            position: fixed;
            top: clamp(10px, 3vw, 25px);
            right: clamp(10px, 3vw, 25px);
            z-index: 100;
        }
        .login-btn {
            padding: clamp(6px, 1.8vw, 14px) clamp(14px, 4vw, 42px);
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(30px);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            font-size: clamp(10px, 2.2vw, 14px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
        }
        .login-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.12));
            border-color: rgba(255,255,255,0.5);
        }

        /* ----- MAIN CONTENT ----- */
        .main-content {
            position: relative;
            z-index: 50;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .search-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .mini-logo .logo-text {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #e6f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .mini-logo .tagline {
            font-size: clamp(10px, 3vw, 14px);
            color: rgba(255,255,255,0.8);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .page-title {
            color: white;
            font-size: clamp(24px, 5vw, 32px);
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: clamp(12px, 3vw, 16px);
        }

        /* ----- SEARCH CARD ----- */
        .search-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: clamp(20px, 5vw, 40px);
            animation: cardFloat 6s infinite alternate;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* ----- TRIP TYPE ----- */
        .trip-type {
            display: flex;
            gap: clamp(10px, 3vw, 20px);
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .trip-option {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .trip-option:hover { background: rgba(255,255,255,0.1); }
        .trip-option input[type="radio"] { width: 16px; height: 16px; cursor: pointer; accent-color: #4CAF50; }

        /* ----- FORM ----- */
        .section-title {
            color: white;
            font-size: clamp(16px, 4vw, 18px);
            margin: 25px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mandatory-badge {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            color: #ff6b6b;
        }

        .optional-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 18px;
            z-index: 1;
            pointer-events: none;
        }

        .input-icon input,
        .input-icon select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            color: white;
            font-size: clamp(13px, 3vw, 15px);
            transition: all 0.3s ease;
        }

        /* Date Input Styles - ENHANCED */
        .date-input-wrapper {
            position: relative;
            width: 100%;
            cursor: pointer;
        }

        .date-input-wrapper input[type="date"] {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            color: white;
            font-size: clamp(13px, 3vw, 15px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            color-scheme: dark;
        }

        /* Custom Calendar Icon */
        .custom-calendar-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.1));
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            pointer-events: auto;
            z-index: 2;
            font-size: 18px;
        }

        .custom-calendar-icon:hover {
            background: rgba(76, 175, 80, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        /* Hide default calendar picker indicator */
        .date-input-wrapper input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            right: 0;
            top: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            opacity: 0;
            z-index: 3;
        }

        .date-input-wrapper input[type="date"]:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Date Picker Animation */
        @keyframes datePickerSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Style the native date picker popup */
        ::-webkit-datetime-edit {
            color: white;
        }

        ::-webkit-datetime-edit-fields-wrapper {
            color: white;
        }

        ::-webkit-datetime-edit-text {
            color: rgba(255,255,255,0.7);
        }

        ::-webkit-datetime-edit-month-field,
        ::-webkit-datetime-edit-day-field,
        ::-webkit-datetime-edit-year-field {
            color: white;
        }

        .input-icon select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
        }

        .input-icon input:focus,
        .input-icon select:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }

        .swap-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .swap-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(180deg);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4CAF50;
        }

        .field-purpose {
            display: block;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            margin-top: 5px;
        }

        .search-btn {
            width: 100%;
            padding: clamp(14px, 4vw, 18px);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.1));
            backdrop-filter: blur(30px);
            border: 1.5px solid #4CAF50;
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .search-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.4), rgba(76, 175, 80, 0.2));
            box-shadow: 0 16px 48px rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }

        /* Airport Dropdown */
        .airport-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            background: #1a1f3a;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 1000;
            backdrop-filter: blur(10px);
            margin-top: 5px;
            animation: datePickerSlideIn 0.2s ease;
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
            color: white;
        }

        .dropdown-item:hover {
            background: rgba(76, 175, 80, 0.3);
            border-left: 3px solid #4CAF50;
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffb6c1, #87ceeb, #ffd700);
            background-size: 300% 100%;
            animation: loading 2s infinite;
            z-index: 1000;
        }

        @keyframes loading {
            0% { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="loading-bar"></div>
<div class="stars"></div>
<div class="twinkling"></div>

<div class="flying-plane plane-1">✈️</div>
<div class="flying-plane plane-2">✈️</div>
<div class="flying-plane plane-3">✈️</div>

<div class="login-container">
    <button class="login-btn" onclick="window.location.href='/signin'">
        <span>✈️</span> Sign In
    </button>
</div>

<div class="main-content">
    <div class="search-header">
        <div class="mini-logo">
            <div class="logo-text">AIRNOVA</div>
            <div class="tagline">FLY BEYOND DREAMS</div>
        </div>
        <h1 class="page-title">Search Flights</h1>
        <p class="page-subtitle">Find the best flights at the best prices</p>
    </div>

    <div class="search-card">
        <!-- Trip Type -->
        <div class="section-title">
            <i>🔍</i> Trip Type
        </div>
        <div class="trip-type">
            <label class="trip-option">
                <input type="radio" name="tripType" value="oneway" checked> 🔹 One Way
            </label>
            <label class="trip-option">
                <input type="radio" name="tripType" value="roundtrip"> 🔸 Round Trip
            </label>
        </div>

        <!-- MANDATORY FIELDS -->
        <div class="section-title">
            <i>📋</i> MANDATORY FIELDS
            <span class="mandatory-badge">REQUIRED</span>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>📍 From <span style="color: #ff6b6b;">*</span></label>
                <div class="input-icon">
                    <i>🛫</i>
                    <input type="text" id="from" placeholder="Delhi (DEL)" required autocomplete="off">
                </div>
                <span class="field-purpose">Kahan se jana hai</span>
            </div>

            <div class="swap-btn">
                <div class="swap-icon" onclick="swapLocations()">⇄</div>
            </div>

            <div class="form-group">
                <label>🛬 To <span style="color: #ff6b6b;">*</span></label>
                <div class="input-icon">
                    <i>🛬</i>
                    <input type="text" id="to" placeholder="Mumbai (BOM)" required autocomplete="off">
                </div>
                <span class="field-purpose">Kahan jana hai</span>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>📅 Departure Date <span style="color: #ff6b6b;">*</span></label>
                <div class="input-icon">
                    <i>📆</i>
                    <div class="date-input-wrapper" id="datePickerWrapper">
                        <input type="date" id="departDate" required>
                        <div class="custom-calendar-icon" id="calendarIcon">📅</div>
                    </div>
                </div>
                <span class="field-purpose">Click anywhere to select date</span>
            </div>
        </div>

        <!-- OPTIONAL FIELDS -->
        <div class="section-title" style="margin-top: 30px;">
            <i>✨</i> OPTIONAL FIELDS
            <span class="optional-badge">FOR BETTER SEARCH</span>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>👥 Passengers</label>
                <div class="input-icon">
                    <i>👤</i>
                    <select id="passengers">
                        <option value="1">1 Passenger</option>
                        <option value="2" selected>2 Passengers</option>
                        <option value="3">3 Passengers</option>
                        <option value="4">4 Passengers</option>
                        <option value="5">5 Passengers</option>
                        <option value="6">6+ Passengers</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>💺 Class</label>
                <div class="input-icon">
                    <i>🪑</i>
                    <select id="class">
                        <option value="ECONOMY">Economy</option>
                        <option value="BUSINESS">Business</option>
                        <option value="FIRST">First Class</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>💰 Max Price (₹)</label>
                <div class="input-icon">
                    <i>💵</i>
                    <input type="number" id="maxPrice" placeholder="5000" min="0">
                </div>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="connectingFlights" checked>
            <label for="connectingFlights">🔄 Include Connecting Flights</label>
        </div>

        <button class="search-btn" onclick="searchFlights()">
            <i>🔍</i> Search Flights <i>✈️</i>
        </button>
    </div>
</div>

<script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const API_BASE = 'http://localhost:8081';
    let airports = [];
    let currentSuggestions = [];

    // ============================================
    // FETCH AIRPORTS FROM DB API
    // ============================================
    async function loadAirportsFromDB() {
        try {
            console.log('🔄 Loading airports from database...');
            const response = await fetch(`${API_BASE}/api/db/airports`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            });

            if (response.ok) {
                airports = await response.json();
                console.log('✅ Loaded', airports.length, 'airports from database');

                if (airports.length === 0) {
                    console.warn('⚠️ No airports found in database');
                    showToast('No airports found. Please contact admin.', true);
                }
            } else {
                console.error('Failed to load airports:', response.status);
                airports = [];
            }
        } catch (error) {
            console.error('Error loading airports:', error);
            airports = [];
        }
    }

    // ============================================
    // SHOW TOAST
    // ============================================
    function showToast(message, isError = false) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.style.cssText = 'position: fixed; bottom: 20px; right: 20px; background: #4caf50; color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 1001; max-width: 350px;';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.background = isError ? '#f44336' : '#4caf50';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    // ============================================
    // FILTER AIRPORTS (Google-like)
    // ============================================
    function filterAirports(searchTerm) {
        if (!searchTerm || searchTerm.length < 1) return [];

        const term = searchTerm.toLowerCase().trim();

        const scored = airports.map(airport => {
            let score = 0;
            const code = (airport.code || '').toLowerCase();
            const city = (airport.city || '').toLowerCase();
            const name = (airport.name || '').toLowerCase();

            if (code === term) score = 100;
            else if (city === term) score = 90;
            else if (name === term) score = 80;
            else if (code.startsWith(term)) score = 70;
            else if (city.startsWith(term)) score = 60;
            else if (name.startsWith(term)) score = 50;
            else if (code.includes(term)) score = 40;
            else if (city.includes(term)) score = 30;
            else if (name.includes(term)) score = 20;

            return { airport, score };
        });

        const matched = scored.filter(item => item.score > 0);
        matched.sort((a, b) => b.score - a.score);

        return matched.slice(0, 8).map(item => item.airport);
    }

    // ============================================
    // CREATE DROPDOWN WITH FIXED POSITIONING
    // ============================================
    function createDropdown(inputElement, suggestions) {
        const existingDropdown = document.getElementById(`dropdown-${inputElement.id}`);
        if (existingDropdown) existingDropdown.remove();

        if (!suggestions || suggestions.length === 0) return;

        const dropdown = document.createElement('div');
        dropdown.id = `dropdown-${inputElement.id}`;
        dropdown.className = 'airport-dropdown';

        suggestions.forEach((airport, index) => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.setAttribute('data-index', index);

            const searchTerm = extractSearchTerm(inputElement.value);
            const highlightedCode = highlightText(airport.code || '', searchTerm);
            const highlightedCity = highlightText(airport.city || '', searchTerm);
            const highlightedName = highlightText(airport.name || '', searchTerm);

            item.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 5px;">
                    <span style="font-weight: 700; color: #ffd700;">${highlightedCode}</span>
                    <span style="color: white;">${highlightedCity}</span>
                </div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px;">${highlightedName}</div>
            `;

            item.onclick = () => {
                selectAirport(inputElement, airport);
            };

            dropdown.appendChild(item);
        });

        inputElement.parentNode.style.position = 'relative';
        inputElement.parentNode.appendChild(dropdown);
    }

    // ============================================
    // HIGHLIGHT TEXT
    // ============================================
    function highlightText(text, searchTerm) {
        if (!searchTerm || !text) return text;
        const lowerText = text.toLowerCase();
        const lowerTerm = searchTerm.toLowerCase();
        const index = lowerText.indexOf(lowerTerm);

        if (index === -1) return text;

        return text.substring(0, index) +
               `<span style="background: #4CAF50; color: white; padding: 0 2px; border-radius: 3px;">${text.substring(index, index + searchTerm.length)}</span>` +
               text.substring(index + searchTerm.length);
    }

    // ============================================
    // SELECT AIRPORT
    // ============================================
    function selectAirport(inputElement, airport) {
        const displayValue = `${airport.city || airport.name} (${airport.code})`;
        inputElement.value = displayValue;

        const dropdown = document.getElementById(`dropdown-${inputElement.id}`);
        if (dropdown) dropdown.remove();

        const event = new Event('change', { bubbles: true });
        inputElement.dispatchEvent(event);
    }

    // ============================================
    // CLOSE DROPDOWN
    // ============================================
    function closeDropdown(inputId) {
        const dropdown = document.getElementById(`dropdown-${inputId}`);
        if (dropdown) dropdown.remove();
    }

    // ============================================
    // EXTRACT SEARCH TERM FROM INPUT
    // ============================================
    function extractSearchTerm(value) {
        const match = value.match(/^[^(]+/);
        return match ? match[0].trim() : value.trim();
    }

    // ============================================
    // SETUP AIRPORT INPUT WITH AUTO-SUGGEST
    // ============================================
    function setupAirportInput(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;

        let debounceTimer;

        input.addEventListener('input', function(e) {
            const value = this.value;
            const searchTerm = extractSearchTerm(value);

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (searchTerm.length >= 1) {
                    const suggestions = filterAirports(searchTerm);
                    createDropdown(input, suggestions);
                } else {
                    closeDropdown(input.id);
                }
            }, 200);
        });

        input.addEventListener('keydown', function(e) {
            const dropdown = document.getElementById(`dropdown-${input.id}`);
            if (!dropdown) return;

            const items = dropdown.querySelectorAll('.dropdown-item');
            let currentIndex = -1;

            for (let i = 0; i < items.length; i++) {
                if (items[i].style.background === 'rgba(76, 175, 80, 0.3)') {
                    currentIndex = i;
                    break;
                }
            }

            switch(e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    if (currentIndex < items.length - 1) {
                        if (currentIndex >= 0) {
                            items[currentIndex].style.background = '';
                            items[currentIndex].style.borderLeft = '';
                        }
                        const newIndex = currentIndex + 1;
                        items[newIndex].style.background = 'rgba(76, 175, 80, 0.3)';
                        items[newIndex].style.borderLeft = '3px solid #4CAF50';
                        items[newIndex].scrollIntoView({ block: 'nearest' });
                    }
                    break;

                case 'ArrowUp':
                    e.preventDefault();
                    if (currentIndex > 0) {
                        if (currentIndex >= 0) {
                            items[currentIndex].style.background = '';
                            items[currentIndex].style.borderLeft = '';
                        }
                        const newIndex = currentIndex - 1;
                        items[newIndex].style.background = 'rgba(76, 175, 80, 0.3)';
                        items[newIndex].style.borderLeft = '3px solid #4CAF50';
                        items[newIndex].scrollIntoView({ block: 'nearest' });
                    }
                    break;

                case 'Enter':
                    e.preventDefault();
                    if (currentIndex >= 0) {
                        const selectedItem = items[currentIndex];
                        const airportData = currentSuggestions[currentIndex];
                        if (airportData) {
                            selectAirport(input, airportData);
                        }
                    }
                    break;

                case 'Escape':
                    e.preventDefault();
                    closeDropdown(input.id);
                    break;
            }
        });

        input.addEventListener('blur', function() {
            setTimeout(() => {
                const dropdown = document.getElementById(`dropdown-${input.id}`);
                if (dropdown) {
                    const activeElement = document.activeElement;
                    if (!dropdown.contains(activeElement)) {
                        closeDropdown(input.id);
                    }
                }
            }, 200);
        });
    }

    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    function extractCode(input) {
        const match = input.match(/\(([^)]+)\)/);
        return match ? match[1] : input.trim();
    }

    function formatTime(dateTimeStr) {
        if (!dateTimeStr) return 'N/A';
        try {
            const date = new Date(dateTimeStr);
            return date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        } catch(e) { return 'N/A'; }
    }

    function formatDate(dateTimeStr) {
        if (!dateTimeStr) return 'N/A';
        try {
            const date = new Date(dateTimeStr);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        } catch(e) { return 'N/A'; }
    }

    function showLoading() {
        const container = document.getElementById('flightsList');
        if (container) {
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Searching flights...</p></div>';
            document.getElementById('resultsSection').classList.add('show');
        }
    }

    // ============================================
    // SEARCH FLIGHTS
    // ============================================
    window.searchFlights = async function() {
        const from = document.getElementById('from').value.trim();
        const to = document.getElementById('to').value.trim();
        const departDate = document.getElementById('departDate').value;
        const maxPrice = document.getElementById('maxPrice').value;
        const travelClass = document.getElementById('class').value;
        const includeConnecting = document.getElementById('connectingFlights').checked;

        if (!from || !to || !departDate) {
            showToast('❌ Please fill all mandatory fields!', true);
            return;
        }

        const sourceCode = extractCode(from);
        const destCode = extractCode(to);

        if (sourceCode === destCode) {
            showToast('❌ Source and Destination cannot be same!', true);
            return;
        }

        if (!sourceCode || sourceCode.length !== 3 || !destCode || destCode.length !== 3) {
            showToast('❌ Please select valid airports from suggestions!', true);
            return;
        }

        // Build search params for results page
        const searchParams = {
            sourceCode: sourceCode,
            destinationCode: destCode,
            travelDate: departDate,
            sourceCity: from,
            destinationCity: to,
            passengers: document.getElementById('passengers').value,
            seatClass: travelClass,
            includeConnecting: includeConnecting,
            maxPrice: maxPrice || ''
        };

        const queryString = new URLSearchParams(searchParams).toString();

        // Redirect to search results page
        window.location.href = `/flights/results?${queryString}`;
    };

    // ============================================
    // REDIRECT TO SEARCH RESULTS (for book now)
    // ============================================
    window.redirectToBooking = function(flightId) {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // Get all search parameters
        const from = document.getElementById('from').value.trim();
        const to = document.getElementById('to').value.trim();

        const params = {
            flightId: flightId,
            sourceCode: extractCode(from),
            destinationCode: extractCode(to),
            travelDate: document.getElementById('departDate').value,
            sourceCity: from,
            destinationCity: to,
            passengers: document.getElementById('passengers').value,
            seatClass: document.getElementById('class').value,
            includeConnecting: document.getElementById('connectingFlights').checked,
            maxPrice: document.getElementById('maxPrice').value
        };

        const queryString = new URLSearchParams(params).toString();

        if (!token || !user.id) {
            sessionStorage.setItem('redirectAfterLogin', `/flights/results?${queryString}`);
            window.location.href = '/signin';
        } else {
            window.location.href = `/flights/results?${queryString}`;
        }
    };

    // ============================================
    // REDIRECT TO CONNECTING BOOKING
    // ============================================
    window.redirectToConnectingBooking = function(segments) {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        const from = document.getElementById('from').value.trim();
        const to = document.getElementById('to').value.trim();

        const params = {
            segments: JSON.stringify(segments),
            sourceCode: extractCode(from),
            destinationCode: extractCode(to),
            travelDate: document.getElementById('departDate').value,
            sourceCity: from,
            destinationCity: to,
            passengers: document.getElementById('passengers').value,
            seatClass: document.getElementById('class').value,
            includeConnecting: document.getElementById('connectingFlights').checked
        };

        const queryString = new URLSearchParams(params).toString();

        if (!token || !user.id) {
            sessionStorage.setItem('redirectAfterLogin', `/flights/results?${queryString}`);
            window.location.href = '/signin';
        } else {
            window.location.href = `/flights/results?${queryString}`;
        }
    };

    // ============================================
    // RECENT SEARCHES
    // ============================================
    function saveRecentSearch(from, to, date) {
        const searches = JSON.parse(localStorage.getItem('recentSearches') || '[]');
        const newSearch = { from, to, date, timestamp: Date.now() };
        const filtered = searches.filter(s => !(s.from === from && s.to === to));
        filtered.unshift(newSearch);
        while (filtered.length > 5) filtered.pop();
        localStorage.setItem('recentSearches', JSON.stringify(filtered));
        loadRecentSearches();
    }

    function loadRecentSearches() {
        const searches = JSON.parse(localStorage.getItem('recentSearches') || '[]');
        const container = document.getElementById('recentSearches');
        if (!container) return;
        if (searches.length === 0) {
            container.innerHTML = '<div style="color: rgba(255,255,255,0.4); font-size: 12px;">No recent searches</div>';
            return;
        }
        container.innerHTML = searches.map(search => `
            <div class="recent-item" onclick="applyRecentSearch('${search.from.replace(/'/g, "\\'")}', '${search.to.replace(/'/g, "\\'")}', '${search.date}')">
                ${search.from} → ${search.to} (${search.date})
            </div>
        `).join('');
    }

    window.applyRecentSearch = function(from, to, date) {
        document.getElementById('from').value = from;
        document.getElementById('to').value = to;
        document.getElementById('departDate').value = date;
        searchFlights();
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    window.swapLocations = function() {
        const from = document.getElementById('from');
        const to = document.getElementById('to');
        const temp = from.value;
        from.value = to.value;
        to.value = temp;
    };

    function setMinDates() {
        const today = new Date().toISOString().split('T')[0];
        const departDate = document.getElementById('departDate');
        if (departDate) departDate.min = today;
    }

    // ============================================
    // STARS & ANIMATIONS
    // ============================================
    function generateStars() {
        const starsContainer = document.querySelector('.stars');
        if (!starsContainer) return;
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const r = Math.random();
            if (r > 0.7) star.classList.add('large');
            else if (r > 0.3) star.classList.add('medium');
            else star.classList.add('small');
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    }

    function createShootingStars() {
        setInterval(() => {
            if (Math.random() > 0.6) {
                const container = document.querySelector('.stars');
                const shooting = document.createElement('div');
                shooting.className = 'shooting-star';
                shooting.style.left = Math.random() * 90 + '%';
                shooting.style.top = Math.random() * 70 + '%';
                container.appendChild(shooting);
                setTimeout(() => shooting.classList.add('active'), 50);
                setTimeout(() => shooting.remove(), 2500);
            }
        }, 2000);
    }

    function checkRedirectAfterLogin() {
        const redirectUrl = sessionStorage.getItem('redirectAfterLogin');
        if (redirectUrl && !window.location.href.includes('signin')) {
            sessionStorage.removeItem('redirectAfterLogin');
            window.location.href = redirectUrl;
        }
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    window.addEventListener('load', async function() {
        console.log('🚀 Initializing search page...');
        await loadAirportsFromDB();
        generateStars();
        createShootingStars();
        setMinDates();

        setupAirportInput('from');
        setupAirportInput('to');

        loadRecentSearches();
        checkRedirectAfterLogin();
        document.body.classList.add('loaded');
        console.log('✅ Initialization complete');
    });

    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        const stars = document.querySelector('.stars');
        if (stars) stars.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
    });
</script>
