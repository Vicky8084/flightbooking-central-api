<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>AirNova – Search Flights</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 30%, #0f1429 60%, #050810 100%);
            position: relative;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 1s ease;
            padding: 20px;
        }

        body.loaded {
            opacity: 1;
        }

        /* ----- STARFIELD ----- */
        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #e6f2ff 60%, transparent 100%);
            border-radius: 50%;
            filter: brightness(1.2);
            will-change: transform, opacity;
        }

        .star.small { width: 1px; height: 1px; box-shadow: 0 0 2px rgba(255,255,255,0.9); }
        .star.medium { width: 2.5px; height: 2.5px; box-shadow: 0 0 4px #fff; }
        .star.large { width: 3.5px; height: 3.5px; box-shadow: 0 0 6px #fff; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .star { animation: starTwinkle 4s infinite ease-in-out; }

        .shooting-star {
            position: absolute;
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            z-index: 3;
            opacity: 0;
        }
        @keyframes shootingStar {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateX(300px) translateY(300px) rotate(45deg); opacity: 0; }
        }
        .shooting-star.active { animation: shootingStar 2s ease-out forwards; }

        /* ----- FLYING PLANES ----- */
        .flying-plane {
            position: fixed;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            z-index: 2;
            animation: fly 20s linear infinite;
            pointer-events: none;
        }
        .plane-1 { top: 20%; left: -10%; animation-delay: 0s; }
        .plane-2 { top: 70%; left: -10%; animation-delay: 10s; }
        .plane-3 { top: 40%; right: -10%; animation-direction: reverse; animation-delay: 5s; }

        @keyframes fly {
            0% { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        /* ----- LOGIN BUTTON ----- */
        .login-container {
            position: fixed;
            top: clamp(10px, 3vw, 25px);
            right: clamp(10px, 3vw, 25px);
            z-index: 100;
        }
        .login-btn {
            padding: clamp(6px, 1.8vw, 14px) clamp(14px, 4vw, 42px);
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(30px);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            font-size: clamp(10px, 2.2vw, 14px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
        }
        .login-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.12));
            border-color: rgba(255,255,255,0.5);
        }

        /* ----- MAIN CONTENT ----- */
        .main-content {
            position: relative;
            z-index: 50;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .search-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .mini-logo .logo-text {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #e6f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .mini-logo .tagline {
            font-size: clamp(10px, 3vw, 14px);
            color: rgba(255,255,255,0.8);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .page-title {
            color: white;
            font-size: clamp(24px, 5vw, 32px);
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: clamp(12px, 3vw, 16px);
        }

        /* ----- SEARCH CARD ----- */
        .search-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: clamp(20px, 5vw, 40px);
            animation: cardFloat 6s infinite alternate;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* ----- TRIP TYPE ----- */
        .trip-type {
            display: flex;
            gap: clamp(10px, 3vw, 20px);
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .trip-option {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .trip-option:hover { background: rgba(255,255,255,0.1); }
        .trip-option input[type="radio"] { width: 16px; height: 16px; cursor: pointer; accent-color: #4CAF50; }

        /* ----- FORM ----- */
        .section-title {
            color: white;
            font-size: clamp(16px, 4vw, 18px);
            margin: 25px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mandatory-badge {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            color: #ff6b6b;
        }

        .optional-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 18px;
            z-index: 1;
        }

        .input-icon input,
        .input-icon select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            color: white;
            font-size: clamp(13px, 3vw, 15px);
            transition: all 0.3s ease;
        }

        .input-icon select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
        }

        .input-icon input:focus,
        .input-icon select:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }

        .swap-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .swap-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(180deg);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4CAF50;
        }

        .field-purpose {
            display: block;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            margin-top: 5px;
        }

        .search-btn {
            width: 100%;
            padding: clamp(14px, 4vw, 18px);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.1));
            backdrop-filter: blur(30px);
            border: 1.5px solid #4CAF50;
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .search-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.4), rgba(76, 175, 80, 0.2));
            box-shadow: 0 16px 48px rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }

        /* ----- RESULTS SECTION ----- */
        .results-section {
            margin-top: 40px;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .flight-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .flight-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .flight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .flight-number {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
        }

        .airline-name {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .flight-route {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .airport {
            text-align: center;
            flex: 1;
        }

        .airport-code {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .airport-city {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .flight-line {
            flex: 2;
            height: 2px;
            background: linear-gradient(90deg, #ffd700, #4CAF50);
            position: relative;
        }

        .flight-line::before {
            content: '✈️';
            position: absolute;
            left: 50%;
            top: -12px;
            transform: translateX(-50%);
            font-size: 14px;
        }

        .flight-time {
            text-align: center;
        }

        .time {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .date {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .flight-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: #4CAF50;
        }

        .book-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .book-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .no-flights {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 18px;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recent-searches {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .recent-title {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recent-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .recent-item {
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .recent-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .airport-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1f3a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-top: 5px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 10;
        }

        .airport-suggestions.show { display: block; }

        .suggestion-item {
            padding: 10px 15px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .suggestion-item:hover { background: rgba(255,255,255,0.1); }

        .suggestion-code {
            color: #4CAF50;
            font-weight: 600;
            margin-right: 10px;
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffb6c1, #87ceeb, #ffd700);
            background-size: 300% 100%;
            animation: loading 2s infinite;
            z-index: 1000;
        }

        @keyframes loading {
            0% { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }

        @media (max-width: 768px) {
            .flight-route { flex-direction: column; }
            .flight-line { width: 100%; margin: 10px 0; }
            .flight-details { flex-direction: column; text-align: center; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="loading-bar"></div>
<div class="stars"></div>
<div class="twinkling"></div>

<div class="flying-plane plane-1">✈️</div>
<div class="flying-plane plane-2">✈️</div>
<div class="flying-plane plane-3">✈️</div>

<div class="login-container">
    <button class="login-btn" onclick="window.location.href='/signin'">
        <span>✈️</span> Sign In
    </button>
</div>

<div class="main-content">
    <div class="search-header">
        <div class="mini-logo">
            <div class="logo-text">AIRNOVA</div>
            <div class="tagline">FLY BEYOND DREAMS</div>
        </div>
        <h1 class="page-title">Search Flights</h1>
        <p class="page-subtitle">Find the best flights at the best prices</p>
    </div>

    <div class="search-card">
        <!-- Trip Type -->
        <div class="section-title">
            <i>🔍</i> Trip Type
        </div>
        <div class="trip-type">
            <label class="trip-option">
                <input type="radio" name="tripType" value="oneway" checked> 🔹 One Way
            </label>
            <label class="trip-option">
                <input type="radio" name="tripType" value="roundtrip"> 🔸 Round Trip
            </label>
        </div>

        <!-- MANDATORY FIELDS -->
        <div class="section-title">
            <i>📋</i> MANDATORY FIELDS
            <span class="mandatory-badge">REQUIRED</span>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>📍 From <span style="color: #ff6b6b;">*</span></label>
                <div class="input-icon">
                    <i>🛫</i>
                    <input type="text" id="from" placeholder="Delhi (DEL)" required autocomplete="off">
                </div>
                <span class="field-purpose">Kahan se jana hai</span>
                <div id="fromSuggestions" class="airport-suggestions"></div>
            </div>

            <div class="swap-btn">
                <div class="swap-icon" onclick="swapLocations()">⇄</div>
            </div>

            <div class="form-group">
                <label>🛬 To <span style="color: #ff6b6b;">*</span></label>
                <div class="input-icon">
                    <i>🛬</i>
                    <input type="text" id="to" placeholder="Mumbai (BOM)" required autocomplete="off">
                </div>
                <span class="field-purpose">Kahan jana hai</span>
                <div id="toSuggestions" class="airport-suggestions"></div>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>📅 Departure Date <span style="color: #ff6b6b;">*</span></label>
                <div class="input-icon">
                    <i>📆</i>
                    <input type="date" id="departDate" required>
                </div>
                <span class="field-purpose">Kab jana hai</span>
            </div>
        </div>

        <!-- OPTIONAL FIELDS -->
        <div class="section-title" style="margin-top: 30px;">
            <i>✨</i> OPTIONAL FIELDS
            <span class="optional-badge">FOR BETTER SEARCH</span>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>👥 Passengers</label>
                <div class="input-icon">
                    <i>👤</i>
                    <select id="passengers">
                        <option value="1">1 Passenger</option>
                        <option value="2" selected>2 Passengers</option>
                        <option value="3">3 Passengers</option>
                        <option value="4">4 Passengers</option>
                        <option value="5">5 Passengers</option>
                        <option value="6">6+ Passengers</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>💺 Class</label>
                <div class="input-icon">
                    <i>🪑</i>
                    <select id="class">
                        <option value="ECONOMY">Economy</option>
                        <option value="BUSINESS">Business</option>
                        <option value="FIRST">First Class</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>💰 Max Price (₹)</label>
                <div class="input-icon">
                    <i>💵</i>
                    <input type="number" id="maxPrice" placeholder="5000" min="0">
                </div>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="connectingFlights" checked>
            <label for="connectingFlights">🔄 Include Connecting Flights</label>
        </div>

        <button class="search-btn" onclick="searchFlights()">
            <i>🔍</i> Search Flights <i>✈️</i>
        </button>

        <div class="recent-searches">
            <div class="recent-title">
                <i>⏱️</i> Recent Searches
            </div>
            <div class="recent-items" id="recentSearches"></div>
        </div>
    </div>

    <!-- RESULTS SECTION -->
    <div id="resultsSection" class="results-section">
        <div class="section-title">
            <i>✈️</i> Available Flights
        </div>
        <div id="flightsList"></div>
    </div>
</div>


</body>
</html>
