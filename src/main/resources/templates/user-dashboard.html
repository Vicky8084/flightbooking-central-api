<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AirNova – My Dashboard</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 30%, #0f1429 60%, #050810 100%);
            font-family: 'Lato', sans-serif;
            color: #eef2ff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #e6f2ff 60%, transparent 100%);
            border-radius: 50%;
            animation: starTwinkle 4s infinite ease-in-out;
        }

        .star.small { width: 1px; height: 1px; }
        .star.medium { width: 2.5px; height: 2.5px; }
        .star.large { width: 3.5px; height: 3.5px; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .flying-plane {
            position: fixed;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            z-index: 2;
            animation: fly 20s linear infinite;
            pointer-events: none;
        }
        .plane-1 { top: 20%; left: -10%; animation-delay: 0s; }
        .plane-2 { top: 70%; left: -10%; animation-delay: 10s; }
        .plane-3 { top: 40%; right: -10%; animation-direction: reverse; animation-delay: 5s; }

        @keyframes fly {
            0% { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 50;
        }

        .sidebar {
            width: 280px;
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 28px 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 42px;
            font-family: 'Lato', sans-serif;
            font-weight: 800;
            font-size: 1.7rem;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area span {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            margin: 6px 0;
            border-radius: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item.active {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
            border-left: 3px solid #ffd700;
        }

        .nav-item:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 28px 32px;
            overflow-x: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-badge {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge span {
            color: white;
        }

        .logout-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            padding: 6px 15px;
            border-radius: 20px;
            color: #ff4444;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,68,68,0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.08);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #ffd700;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }

        .section-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .section-title i {
            color: #ffd700;
        }

        .pending-booking-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
            border: 1px solid #ffd700;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .continue-btn {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: #1a1f2e;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            z-index: 1;
            pointer-events: none;
        }

        .input-icon input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255,255,255,0.12);
        }

        .swap-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .swap-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(180deg);
        }

        .date-input-wrapper {
            position: relative;
            width: 100%;
            cursor: pointer;
        }

        .date-input-wrapper input[type="date"] {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            color-scheme: dark;
        }

        .date-input-wrapper input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .date-input-wrapper::before {
            content: '\f073';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            z-index: 1;
            pointer-events: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ffd700;
        }

        .search-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ffb700);
            border: none;
            border-radius: 40px;
            color: #1a1f2e;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }

        .airport-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 250px;
            overflow-y: auto;
            background: #1a1f3a;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            z-index: 100;
            margin-top: 5px;
        }

        .dropdown-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
            color: white;
        }

        .dropdown-item:hover {
            background: rgba(255,215,0,0.2);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ffd700, #ffb700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #1a1f2e;
        }

        .profile-info h2 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .profile-info p {
            color: rgba(255,255,255,0.6);
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .profile-stat-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .profile-stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
        }

        .profile-stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }

        .profile-details {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .detail-label {
            width: 140px;
            font-weight: 600;
            color: #ffd700;
        }

        .detail-value {
            flex: 1;
            color: rgba(255,255,255,0.8);
        }

        .edit-profile-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            padding: 10px 24px;
            border-radius: 30px;
            color: #ffd700;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .booking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .booking-table th,
        .booking-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .booking-table th {
            color: #ffd700;
            font-weight: 600;
            font-size: 13px;
        }

        .booking-table tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .status-confirmed {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .status-cancelled {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .status-completed {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .btn-view {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196F3;
            padding: 5px 14px;
            border-radius: 20px;
            color: #2196F3;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            padding: 5px 14px;
            border-radius: 20px;
            color: #f44336;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-view:hover, .btn-cancel:hover {
            transform: scale(1.02);
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1f2e;
            border-radius: 24px;
            padding: 28px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #ffd700;
            font-size: 20px;
        }

        .modal-content textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }

        .confirm-cancel {
            background: #f44336;
            color: white;
        }

        .modal-segment {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid #ffd700;
        }

        .modal-segment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .modal-segment-airline {
            font-weight: 700;
            color: #ffd700;
        }

        .modal-segment-route {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-seat-info {
            background: rgba(255,215,0,0.1);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #ffd700;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1001;
            font-size: 14px;
        }

        .toast.error {
            background: #f44336;
        }

        @media (max-width: 900px) {
            .dashboard-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                padding: 20px;
            }
            .nav-menu {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .nav-item {
                padding: 8px 16px;
            }
            .main-content {
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .profile-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .detail-row {
                flex-direction: column;
            }
            .detail-label {
                width: 100%;
                margin-bottom: 5px;
            }
            .booking-table {
                display: block;
                overflow-x: auto;
            }
        }

        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .profile-stats {
                grid-template-columns: 1fr;
            }
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="twinkling"></div>

<div class="flying-plane plane-1">✈️</div>
<div class="flying-plane plane-2">✈️</div>
<div class="flying-plane plane-3">✈️</div>

<div class="dashboard-layout">
    <div class="sidebar">
        <div class="logo-area">AIRNOVA <span>v2.0</span></div>
        <div class="nav-menu">
            <div class="nav-item active" data-tab="dashboard">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" data-tab="upcoming">
                <i class="fas fa-calendar-alt"></i>
                <span>Upcoming Trips</span>
            </div>
            <div class="nav-item" data-tab="bookings">
                <i class="fas fa-history"></i>
                <span>My Bookings</span>
            </div>
            <div class="nav-item" data-tab="cancelled">
                <i class="fas fa-ban"></i>
                <span>Cancelled</span>
            </div>
            <div class="nav-item" data-tab="search">
                <i class="fas fa-search"></i>
                <span>Search Flights</span>
            </div>
            <div class="nav-item" data-tab="profile">
                <i class="fas fa-user"></i>
                <span>My Profile</span>
            </div>
            <div class="nav-item" data-tab="logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="dashboard-header">
            <h1 class="page-title" id="mainTitle">📊 My Dashboard</h1>
            <div class="user-badge">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Loading...</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="appContainer">
            <div class="loading"><div class="spinner"></div><p>Loading your dashboard...</p></div>
        </div>
    </div>
</div>

<!-- Booking Details Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-ticket-alt"></i> Booking Details</h3>
        <div id="modalBody">Loading...</div>
        <div class="modal-buttons">
            <button onclick="closeModal()" style="background: rgba(255,255,255,0.1); color: white;">Close</button>
        </div>
    </div>
</div>

<!-- Edit Profile Modal -->
<div id="editProfileModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Full Name</label>
            <input type="text" id="editFullName" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white;">
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Phone Number</label>
            <input type="tel" id="editPhone" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white;">
        </div>
        <div class="modal-buttons">
            <button onclick="closeEditProfileModal()" style="background: rgba(255,255,255,0.1); color: white;">Cancel</button>
            <button onclick="saveProfileChanges()" style="background: #ffd700; color: #1a1f2e;">Save Changes</button>
        </div>

<div id="toast" class="toast"></div>

<script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const API_BASE = '';
    let currentUser = null;
    let currentCancelBookingId = null;
    let allBookingsData = {
        upcoming: [],
        past: [],
        cancelled: []
    };
    let currentTab = 'dashboard';
    let airports = [];

    // ============================================
    // TOAST NOTIFICATION
    // ============================================
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    // ============================================
    // LOGOUT
    // ============================================
    async function logout() {
        try {
            await fetch(`${API_BASE}/api/auth/logout`, { method: 'POST', credentials: 'include' });
        } catch (error) {}
        sessionStorage.removeItem('user');
        localStorage.removeItem('user');
        window.location.href = '/signin';
    }

    // ============================================
    // FETCH API WITH AUTH
    // ============================================
    async function fetchAPI(url, options = {}) {
        try {
            console.log(`📡 API CALL: ${url}`);
            const response = await fetch(url, {
                ...options,
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            if (response.status === 401) {
                console.error(`❌ API 401 Unauthorized: ${url}`);
                window.location.href = '/signin';
                return null;
            }

            if (!response.ok) {
                const error = await response.json();
                console.error(`❌ API Error ${response.status}: ${url}`, error);
                throw new Error(error.message || `HTTP ${response.status}`);
            }

            const data = await response.json();
            console.log(`✅ API Success: ${url}`, data);
            return data;
        } catch (error) {
            console.error(`❌ API Exception: ${url}`, error);
            showToast(error.message, true);
            throw error;
        }
    }

    // ============================================
    // LOAD AIRPORTS
    // ============================================
    async function loadAirports() {
        console.log('🛫 Loading airports...');
        try {
            const response = await fetch(`${API_BASE}/api/db/airports`, {
                method: 'GET',
                credentials: 'include'
            });
            if (response.ok) {
                airports = await response.json();
                console.log(`✅ Airports loaded: ${airports.length}`);
            } else {
                console.error('❌ Failed to load airports:', response.status);
            }
        } catch (error) {
            console.error('❌ Error loading airports:', error);
        }
    }

    // ============================================
    // AIRPORT AUTOCOMPLETE
    // ============================================
    function filterAirports(searchTerm) {
        if (!searchTerm || searchTerm.length < 1) return [];
        const term = searchTerm.toLowerCase().trim();
        const scored = airports.map(airport => {
            let score = 0;
            const code = (airport.code || '').toLowerCase();
            const city = (airport.city || '').toLowerCase();
            const name = (airport.name || '').toLowerCase();
            if (code === term) score = 100;
            else if (city === term) score = 90;
            else if (name === term) score = 80;
            else if (code.startsWith(term)) score = 70;
            else if (city.startsWith(term)) score = 60;
            else if (name.startsWith(term)) score = 50;
            else if (code.includes(term)) score = 40;
            else if (city.includes(term)) score = 30;
            else if (name.includes(term)) score = 20;
            return { airport, score };
        });
        const matched = scored.filter(item => item.score > 0);
        matched.sort((a, b) => b.score - a.score);
        return matched.slice(0, 8).map(item => item.airport);
    }

    function createDropdown(inputElement, suggestions) {
        const existingDropdown = document.getElementById(`dropdown-${inputElement.id}`);
        if (existingDropdown) existingDropdown.remove();
        if (!suggestions || suggestions.length === 0) return;
        const dropdown = document.createElement('div');
        dropdown.id = `dropdown-${inputElement.id}`;
        dropdown.className = 'airport-dropdown';
        suggestions.forEach(airport => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerHTML = `<div><strong>${airport.code}</strong> - ${airport.city}</div><div style="font-size: 11px; color: rgba(255,255,255,0.6);">${airport.name}</div>`;
            item.onclick = () => {
                inputElement.value = `${airport.city} (${airport.code})`;
                dropdown.remove();
            };
            dropdown.appendChild(item);
        });
        inputElement.parentNode.style.position = 'relative';
        inputElement.parentNode.appendChild(dropdown);
    }

    function setupAirportInput(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        let debounceTimer;
        input.addEventListener('input', function(e) {
            const value = this.value;
            const searchTerm = value.split('(')[0].trim();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (searchTerm.length >= 1) {
                    const suggestions = filterAirports(searchTerm);
                    createDropdown(input, suggestions);
                } else {
                    const existing = document.getElementById(`dropdown-${input.id}`);
                    if (existing) existing.remove();
                }
            }, 200);
        });
        input.addEventListener('blur', function() {
            setTimeout(() => {
                const dropdown = document.getElementById(`dropdown-${input.id}`);
                if (dropdown) dropdown.remove();
            }, 200);
        });
    }

    function extractCode(input) {
        const match = input.match(/\(([^)]+)\)/);
        return match ? match[1] : input.trim();
    }

    // ============================================
    // LOAD USER PROFILE
    // ============================================
    async function loadUserProfile() {
        console.log('👤 Loading user profile...');
        try {
            const data = await fetchAPI(`${API_BASE}/user/api/profile`);
            if (data) {
                currentUser = data;
                document.getElementById('userName').textContent = `${data.fullName?.split(' ')[0] || 'User'}`;
                console.log('✅ Profile loaded:', { name: data.fullName, email: data.email, totalBookings: data.totalBookings });
                return data;
            }
        } catch (error) {
            console.error('❌ Error loading profile:', error);
            return null;
        }
    }

    // ============================================
    // LOAD ALL BOOKINGS WITH LOGS
    // ============================================
    async function loadAllBookings() {
        console.log('📋 Loading all bookings...');
        try {
            console.log('📡 Calling: /user/api/bookings/upcoming');
            const upcoming = await fetchAPI(`${API_BASE}/user/api/bookings/upcoming`).catch(() => []);
            console.log(`📊 Upcoming bookings: ${upcoming?.length || 0}`, upcoming);

            console.log('📡 Calling: /user/api/bookings/past');
            const past = await fetchAPI(`${API_BASE}/user/api/bookings/past`).catch(() => []);
            console.log(`📊 Past bookings: ${past?.length || 0}`, past);

            console.log('📡 Calling: /user/api/bookings/cancelled');
            const cancelled = await fetchAPI(`${API_BASE}/user/api/bookings/cancelled`).catch(() => []);
            console.log(`📊 Cancelled bookings: ${cancelled?.length || 0}`, cancelled);

            allBookingsData = { upcoming: upcoming || [], past: past || [], cancelled: cancelled || [] };
            console.log('✅ All bookings loaded:', {
                upcoming: allBookingsData.upcoming.length,
                past: allBookingsData.past.length,
                cancelled: allBookingsData.cancelled.length,
                total: allBookingsData.upcoming.length + allBookingsData.past.length + allBookingsData.cancelled.length
            });
            return allBookingsData;
        } catch (error) {
            console.error('❌ Error loading bookings:', error);
            return { upcoming: [], past: [], cancelled: [] };
        }
    }

    // ============================================
    // CHECK PENDING BOOKING
    // ============================================
    function checkPendingBooking() {
        const pending = sessionStorage.getItem('pendingBooking');
        if (pending) {
            try {
                const booking = JSON.parse(pending);
                console.log('⏳ Pending booking found:', booking);
                if (booking.flightId && booking.fareCode) {
                    return booking;
                }
            } catch(e) {
                console.error('❌ Error parsing pending booking:', e);
            }
        }
        return null;
    }

    // ============================================
    // FETCH FLIGHT DETAILS FOR PENDING BOOKING
    // ============================================
    async function getFlightDetailsForPending(flightId) {
        console.log(`✈️ Fetching flight details for pending booking: ${flightId}`);
        try {
            const flight = await fetchAPI(`${API_BASE}/api/db/flights/${flightId}`);
            return flight;
        } catch (error) {
            console.error('❌ Error fetching flight details:', error);
            return null;
        }
    }

    // ============================================
    // RENDER SEARCH FLIGHTS SECTION
    // ============================================
    function renderSearchFlights(restoreData = null) {
        const defaultFrom = restoreData?.sourceCity ? `${restoreData.sourceCity} (${restoreData.sourceCode})` : '';
        const defaultTo = restoreData?.destinationCity ? `${restoreData.destinationCity} (${restoreData.destinationCode})` : '';
        const defaultDate = restoreData?.travelDate || '';

        return `
            <div class="section-card">
                <div class="section-title"><i class="fas fa-search"></i> Search Flights</div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>📍 From</label>
                        <div class="input-icon">
                            <i class="fas fa-plane-departure"></i>
                            <input type="text" id="fromSearch" placeholder="City or Airport" autocomplete="off" value="${defaultFrom.replace(/"/g, '&quot;')}">
                        </div>
                    </div>
                    <div class="swap-btn">
                        <div class="swap-icon" onclick="swapLocations()">⇄</div>
                    </div>
                    <div class="form-group">
                        <label>🛬 To</label>
                        <div class="input-icon">
                            <i class="fas fa-plane-arrival"></i>
                            <input type="text" id="toSearch" placeholder="City or Airport" autocomplete="off" value="${defaultTo.replace(/"/g, '&quot;')}">
                        </div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>📅 Departure Date</label>
                        <div class="input-icon">
                            <i class="fas fa-calendar-alt"></i>
                            <div class="date-input-wrapper">
                                <input type="date" id="departDateSearch" required value="${defaultDate}">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="connectingFlightsSearch" checked>
                    <label for="connectingFlightsSearch">🔄 Include Connecting Flights</label>
                </div>

                <button class="search-btn" onclick="performSearch()">
                    <i class="fas fa-search"></i> Search Flights <i class="fas fa-plane"></i>
                </button>
            </div>
        `;
    }

    function swapLocations() {
        const from = document.getElementById('fromSearch');
        const to = document.getElementById('toSearch');
        if (from && to) {
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }
    }

    function performSearch() {
        const from = document.getElementById('fromSearch')?.value;
        const to = document.getElementById('toSearch')?.value;
        const departDate = document.getElementById('departDateSearch')?.value;
        const includeConnecting = document.getElementById('connectingFlightsSearch')?.checked;

        if (!from || !to || !departDate) {
            showToast('Please fill all mandatory fields!', true);
            return;
        }

        const sourceCode = extractCode(from);
        const destCode = extractCode(to);
        const sourceCity = from.split('(')[0].trim();
        const destCity = to.split('(')[0].trim();

        const params = new URLSearchParams({
            sourceCode: sourceCode,
            destinationCode: destCode,
            travelDate: departDate,
            sourceCity: sourceCity,
            destinationCity: destCity,
            includeConnecting: includeConnecting
        });

        console.log('🔍 Searching flights with params:', params.toString());
        window.location.href = `/flights/results?${params.toString()}`;
    }

    // ============================================
    // RENDER PROFILE SECTION
    // ============================================
    function renderProfile(profile, bookings) {
        if (!profile) return '<div class="loading"><div class="spinner"></div><p>Loading profile...</p></div>';

        const memberDate = profile.memberSince ? new Date(profile.memberSince).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' }) : 'N/A';

        return `
            <div class="section-card">
                <div class="section-title"><i class="fas fa-user"></i> My Profile</div>

                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h2>${profile.fullName || 'User'}</h2>
                        <p>${profile.email || 'N/A'} • Member since ${memberDate}</p>
                        <button class="edit-profile-btn" onclick="openEditProfileModal()"><i class="fas fa-edit"></i> Edit Profile</button>
                    </div>
                </div>

                <div class="profile-stats">
                    <div class="profile-stat-item">
                        <div class="profile-stat-value">${profile.totalBookings || 0}</div>
                        <div class="profile-stat-label">Total Bookings</div>
                    </div>
                    <div class="profile-stat-item">
                        <div class="profile-stat-value">${profile.upcomingTrips || 0}</div>
                        <div class="profile-stat-label">Upcoming Trips</div>
                    </div>
                    <div class="profile-stat-item">
                        <div class="profile-stat-value">${profile.completedTrips || 0}</div>
                        <div class="profile-stat-label">Completed Trips</div>
                    </div>
                    <div class="profile-stat-item">
                        <div class="profile-stat-value">${profile.cancelledTrips || 0}</div>
                        <div class="profile-stat-label">Cancelled Trips</div>
                    </div>
                </div>

                <div class="profile-details">
                    <div class="detail-row">
                        <div class="detail-label">Full Name</div>
                        <div class="detail-value">${profile.fullName || 'N/A'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Email Address</div>
                        <div class="detail-value">${profile.email || 'N/A'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Phone Number</div>
                        <div class="detail-value">${profile.phoneNumber || 'Not provided'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Account Status</div>
                        <div class="detail-value"><span style="color: #4CAF50;">${profile.status || 'ACTIVE'}</span></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Member Since</div>
                        <div class="detail-value">${memberDate}</div>
                    </div>
                </div>
            </div>
        `;
    }

    function openEditProfileModal() {
        if (currentUser) {
            document.getElementById('editFullName').value = currentUser.fullName || '';
            document.getElementById('editPhone').value = currentUser.phoneNumber || '';
            document.getElementById('editProfileModal').style.display = 'flex';
        }
    }

    function closeEditProfileModal() {
        document.getElementById('editProfileModal').style.display = 'none';
    }

    async function saveProfileChanges() {
        const fullName = document.getElementById('editFullName').value;
        const phoneNumber = document.getElementById('editPhone').value;

        if (!fullName) {
            showToast('Full name is required', true);
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/user/api/profile`, {
                method: 'PUT',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, phoneNumber })
            });

            if (response.ok) {
                showToast('Profile updated successfully!');
                closeEditProfileModal();
                await loadUserProfile();
                await renderTab('profile');
            } else {
                showToast('Failed to update profile', true);
            }
        } catch (error) {
            showToast('Network error', true);
        }
    }

    // ============================================
    // GET SEAT NUMBER FROM SEAT ID
    // ============================================
    async function getSeatNumber(seatId) {
        try {
            const seat = await fetchAPI(`${API_BASE}/api/db/seats/${seatId}`);
            return seat?.seatNumber || 'Auto-assigned';
        } catch (error) {
            return 'Auto-assigned';
        }
    }

    // ============================================
    // VIEW BOOKING DETAILS
    // ============================================
    async function viewBooking(bookingId) {
        console.log(`🔍 Viewing booking details for ID: ${bookingId}`);
        try {
            const booking = await fetchAPI(`${API_BASE}/user/api/bookings/${bookingId}`);
            const modal = document.getElementById('bookingModal');
            const modalBody = document.getElementById('modalBody');

            const bookingFlights = booking.bookingFlights || [];
            const isConnecting = bookingFlights.length > 1;
            console.log(`📊 Booking has ${bookingFlights.length} flights, isConnecting: ${isConnecting}`);

            let flightsHtml = '';

            if (isConnecting) {
                flightsHtml = `<div style="margin-bottom: 15px;"><strong>✈️ Connecting Flight (${bookingFlights.length} Segments)</strong></div>`;

                for (let i = 0; i < bookingFlights.length; i++) {
                    const bf = bookingFlights[i];
                    const flight = bf.flight;
                    const sourceAirport = flight.sourceAirport || {};
                    const destAirport = flight.destinationAirport || {};

                    const passengerSeats = bf.passengerSeats || [];
                    let seatNumbersHtml = '';
                    for (const ps of passengerSeats) {
                        const seatNum = await getSeatNumber(ps.seat.id);
                        seatNumbersHtml += `<div style="display: flex; justify-content: space-between; padding: 5px 0;">
                            <span>${ps.passenger.fullName}</span>
                            <span style="font-weight: 700; color: #ffd700;">${seatNum}</span>
                        </div>`;
                    }

                    flightsHtml += `
                        <div class="modal-segment">
                            <div class="modal-segment-header">
                                <span class="modal-segment-airline">✈️ ${flight.aircraft?.airline?.name || 'Airline'}</span>
                                <span>Flight ${flight.flightNumber}</span>
                                <span>Segment ${i+1} of ${bookingFlights.length}</span>
                            </div>
                            <div class="modal-segment-route">
                                <div><strong>${sourceAirport.code || 'N/A'}</strong><br>${sourceAirport.city || ''}<br>${formatDateTime(flight.departureTime)}</div>
                                <div><i class="fas fa-long-arrow-alt-right"></i> ${flight.duration || 0} min</div>
                                <div><strong>${destAirport.code || 'N/A'}</strong><br>${destAirport.city || ''}<br>${formatDateTime(flight.arrivalTime)}</div>
                            </div>
                            <div class="modal-seat-info">
                                <strong>🎫 Seats:</strong>
                                ${seatNumbersHtml}
                            </div>
                        </div>
                    `;
                }
            } else {
                const flight = booking.bookingFlights?.[0]?.flight;
                const passengerSeats = booking.bookingFlights?.[0]?.passengerSeats || [];
                let seatNumbersHtml = '';
                for (const ps of passengerSeats) {
                    const seatNum = await getSeatNumber(ps.seat.id);
                    seatNumbersHtml += `<div style="display: flex; justify-content: space-between; padding: 5px 0;">
                        <span>${ps.passenger.fullName}</span>
                        <span style="font-weight: 700; color: #ffd700;">${seatNum}</span>
                    </div>`;
                }

                flightsHtml = `
                    <div class="modal-segment">
                        <div class="modal-segment-header">
                            <span class="modal-segment-airline">✈️ ${flight?.aircraft?.airline?.name || 'Airline'}</span>
                            <span>Flight ${flight?.flightNumber || 'N/A'}</span>
                        </div>
                        <div class="modal-segment-route">
                            <div><strong>${flight?.sourceAirport?.code || 'N/A'}</strong><br>${flight?.sourceAirport?.city || ''}<br>${formatDateTime(flight?.departureTime)}</div>
                            <div><i class="fas fa-long-arrow-alt-right"></i> ${flight?.duration || 0} min</div>
                            <div><strong>${flight?.destinationAirport?.code || 'N/A'}</strong><br>${flight?.destinationAirport?.city || ''}<br>${formatDateTime(flight?.arrivalTime)}</div>
                        </div>
                        <div class="modal-seat-info">
                            <strong>🎫 Seats:</strong>
                            ${seatNumbersHtml}
                        </div>
                    </div>
                `;
            }

            modalBody.innerHTML = `
                <div style="margin-bottom: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px;">
                    <strong>PNR:</strong> ${booking.pnrNumber}<br>
                    <strong>Status:</strong> <span class="status-${booking.status.toLowerCase()}">${booking.status}</span><br>
                    <strong>Booking Date:</strong> ${new Date(booking.bookingTime).toLocaleString()}
                </div>
                ${flightsHtml}
                <div style="margin-bottom: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px;">
                    <strong>💰 Fare Details</strong><br>
                    Fare Class: ${booking.fareClassName} (${booking.fareClassCode})<br>
                    <strong>Total: ₹${Math.round(booking.finalPrice)}</strong>
                </div>
                <div style="margin-bottom: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px;">
                    <strong>🧳 Baggage Allowance</strong><br>
                    Cabin: ${booking.cabinBaggageKg}kg | Checked: ${booking.checkInBaggageKg}kg
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>👥 Passengers (${booking.passengers.length})</strong><br>
                    ${booking.passengers.map(p => `<div style="margin-left: 10px; padding: 5px 0;">• ${p.fullName}</div>`).join('')}
                </div>
                ${booking.cancellationFee > 0 ? `<div style="margin-top: 15px; padding: 12px; background: rgba(244,67,54,0.1); border-radius: 12px;"><strong>⚠️ Cancellation Policy</strong><br>Cancellation Fee: ₹${booking.cancellationFee}<br>Refund Policy: ${booking.cancellationPolicy}</div>` : ''}
            `;
            modal.style.display = 'flex';
        } catch (error) {
            console.error('❌ Error fetching booking details:', error);
            showToast('Failed to load booking details', true);
        }
    }

    function formatDateTime(dateStr) {
        if (!dateStr) return 'N/A';
        try {
            const date = new Date(dateStr);
            return date.toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        } catch(e) { return dateStr; }
    }

    // ============================================
    // RENDER BOOKING TABLES
    // ============================================
    function renderBookingTable(bookings, type) {
        console.log(`📊 Rendering ${type} bookings table with ${bookings?.length || 0} bookings`);
        if (!bookings || bookings.length === 0) {
            return '<div class="no-data">📋 No bookings found</div>';
        }
        return `
            <table class="booking-table">
                <thead>
                    <tr><th>PNR</th><th>Flight</th><th>Route</th><th>Date</th><th>Fare</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    ${bookings.map(b => `
                        <tr>
                            <td>${b.pnrNumber || 'N/A'}</td>
                            <td>${b.flightNumber || 'N/A'}</td>
                            <td>${b.sourceCode || 'N/A'} → ${b.destinationCode || 'N/A'}</td>
                            <td>${formatDate(b.departureTime)}</td>
                            <td>₹${Math.round(b.totalAmount || 0)}</td>
                            <td><span class="status-${(b.status || '').toLowerCase()}">${b.status || 'N/A'}</span></td>
                            <td>
                                <button class="btn-view" onclick="viewBooking(${b.bookingId})">View</button>
                                ${b.canCancel ? `<button class="btn-cancel" onclick="openCancelModal(${b.bookingId}, '${b.pnrNumber}', ${b.totalAmount})">Cancel</button>` : ''}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        try {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        } catch(e) { return dateStr; }
    }

    function formatTime(dateStr) {
        if (!dateStr) return 'N/A';
        try {
            const date = new Date(dateStr);
            return date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        } catch(e) { return dateStr; }
    }

    // ============================================
    // RENDER DASHBOARD
    // ============================================
    async function renderDashboard() {
        console.log('📊 Rendering Dashboard...');
        const profile = await loadUserProfile();
        const bookings = await loadAllBookings();
        const pendingBooking = checkPendingBooking();

        let pendingFlightDetails = null;
        let pendingHtml = '';

        if (pendingBooking && pendingBooking.flightId) {
            pendingFlightDetails = await getFlightDetailsForPending(pendingBooking.flightId);

            if (pendingFlightDetails) {
                const sourceCode = pendingFlightDetails.sourceAirport?.code || pendingFlightDetails.sourceCode || 'N/A';
                const destCode = pendingFlightDetails.destinationAirport?.code || pendingFlightDetails.destCode || 'N/A';
                const airline = pendingFlightDetails.aircraft?.airline?.name || pendingFlightDetails.airlineName || 'Airline';
                const flightNumber = pendingFlightDetails.flightNumber;
                const departureTime = pendingFlightDetails.departureTime;
                const fareClass = pendingBooking.fareCode || 'STANDARD';
                const price = pendingBooking.price || (pendingFlightDetails.currentPriceEconomy || pendingFlightDetails.basePriceEconomy || 0);

                const fareDisplay = fareClass === 'BUSINESS' ? 'Business Class' : (fareClass === 'FIRST' ? 'First Class' : (fareClass === 'FLEX' ? 'Economy Flex' : (fareClass === 'LITE' ? 'Economy Lite' : 'Economy Standard')));

                pendingHtml = `
                    <div class="section-card">
                        <div class="section-title"><i class="fas fa-clock"></i> Complete Your Booking</div>
                        <div class="pending-booking-card">
                            <div class="pending-info">
                                <h4><i class="fas fa-plane"></i> ${airline} • ${flightNumber}</h4>
                                <div class="pending-flight-route">${sourceCode} → ${destCode}</div>
                                <div class="pending-flight-details">
                                    <i class="fas fa-calendar-alt"></i> ${formatDate(departureTime)} at ${formatTime(departureTime)}<br>
                                    <i class="fas fa-tag"></i> ${fareDisplay} • ₹${Math.round(price)} per adult
                                </div>
                            </div>
                            <button class="continue-btn" onclick="continuePendingBooking('${pendingBooking.flightId}', '${pendingBooking.fareCode}')">Continue Booking →</button>
                        </div>
                    </div>
                `;
            }
        }

        const upcomingCount = bookings.upcoming?.length || 0;
        const pastCount = bookings.past?.length || 0;
        const cancelledCount = bookings.cancelled?.length || 0;
        const totalBookings = upcomingCount + pastCount + cancelledCount;

        console.log(`📊 Dashboard Stats - Total: ${totalBookings}, Upcoming: ${upcomingCount}, Past: ${pastCount}, Cancelled: ${cancelledCount}`);

        const html = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">✈️</div><div class="stat-value">${totalBookings}</div><div class="stat-label">Total Bookings</div></div>
                <div class="stat-card"><div class="stat-icon">🛫</div><div class="stat-value">${upcomingCount}</div><div class="stat-label">Upcoming Trips</div></div>
                <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${pastCount}</div><div class="stat-label">Completed Trips</div></div>
                <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-value">${cancelledCount}</div><div class="stat-label">Cancelled</div></div>
            </div>
            ${pendingHtml}
            <div class="section-card">
                <div class="section-title"><i class="fas fa-search"></i> Quick Flight Search</div>
                <div class="quick-search" style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <input type="text" id="quickFrom" placeholder="From (City or Airport)" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white;">
                    <input type="text" id="quickTo" placeholder="To (City or Airport)" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white;">
                    <input type="date" id="quickDate" style="flex: 0.5; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white;">
                    <button onclick="quickSearchDashboard()" style="padding: 12px 24px; background: linear-gradient(135deg, #ffd700, #ffb700); border: none; border-radius: 30px; color: #1a1f2e; font-weight: 700; cursor: pointer;">Search</button>
                </div>
            </div>
            <div class="section-card" id="upcomingSection">
                <div class="section-title"><i class="fas fa-calendar-alt"></i> Upcoming Trips</div>
                <div id="upcomingContainer">${renderBookingTable(bookings.upcoming, 'upcoming')}</div>
            </div>
            <div class="section-card" id="recentSection">
                <div class="section-title"><i class="fas fa-history"></i> Recent Bookings</div>
                <div id="recentContainer">${renderBookingTable(bookings.past.slice(0, 5), 'past')}${bookings.past.length > 5 ? `<div style="text-align: center; margin-top: 15px;"><a href="#" onclick="switchTab('bookings')" style="color: #ffd700;">View all ${bookings.past.length} bookings →</a></div>` : ''}</div>
            </div>
            <div class="section-card" id="cancelledSection">
                <div class="section-title"><i class="fas fa-ban"></i> Cancelled Bookings</div>
                <div id="cancelledContainer">${renderBookingTable(bookings.cancelled.slice(0, 5), 'cancelled')}${bookings.cancelled.length > 5 ? `<div style="text-align: center; margin-top: 15px;"><a href="#" onclick="switchTab('cancelled')" style="color: #ffd700;">View all ${bookings.cancelled.length} bookings →</a></div>` : ''}</div>
            </div>
        `;

        document.getElementById('appContainer').innerHTML = html;

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('quickDate').value = today;
        setupAirportInput('quickFrom');
        setupAirportInput('quickTo');

        console.log('✅ Dashboard rendered successfully');
    }

    function quickSearchDashboard() {
        const from = document.getElementById('quickFrom')?.value;
        const to = document.getElementById('quickTo')?.value;
        const date = document.getElementById('quickDate')?.value;
        if (!from || !to || !date) {
            showToast('Please fill all search fields', true);
            return;
        }
        const sourceCode = extractCode(from);
        const destCode = extractCode(to);
        const sourceCity = from.split('(')[0].trim();
        const destCity = to.split('(')[0].trim();
        const params = new URLSearchParams({
            sourceCode: sourceCode, destinationCode: destCode, travelDate: date,
            sourceCity: sourceCity, destinationCity: destCity, includeConnecting: true
        });
        window.location.href = `/flights/results?${params.toString()}`;
    }

    function continuePendingBooking(flightId, fareCode) {
        window.location.href = `/booking?flightId=${flightId}&fareCode=${fareCode}`;
    }

    // ============================================
    // CANCEL BOOKING
    // ============================================
    function openCancelModal(bookingId, pnr, amount) {
        currentCancelBookingId = bookingId;
        document.getElementById('cancelInfo').innerHTML = `Are you sure you want to cancel booking <strong>${pnr}</strong>?<br>Total Amount: ₹${Math.round(amount)}<br><span style="color: #ffd700;">Refund will be calculated based on cancellation policy.</span>`;
        document.getElementById('cancelModal').style.display = 'flex';
    }

    async function confirmCancel() {
        if (!currentCancelBookingId) return;
        const reason = document.getElementById('cancelReason').value;

        document.getElementById('loadingOverlay')?.remove();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'loadingOverlay';
        loadingDiv.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 10000;';
        loadingDiv.innerHTML = '<div class="spinner"></div><p style="color: white; margin-top: 20px;">Cancelling booking...</p>';
        document.body.appendChild(loadingDiv);

        try {
            const result = await fetchAPI(`${API_BASE}/user/api/bookings/${currentCancelBookingId}/cancel`, {
                method: 'POST',
                body: JSON.stringify({ reason })
            });
            showToast(`✅ Booking cancelled! Refund: ₹${Math.round(result.refundAmount || 0)}`);
            closeCancelModal();
            await renderTab(currentTab);
        } catch (error) {
            showToast('Failed to cancel booking', true);
        } finally {
            document.getElementById('loadingOverlay')?.remove();
        }
    }

    function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }
    function closeCancelModal() { document.getElementById('cancelModal').style.display = 'none'; currentCancelBookingId = null; document.getElementById('cancelReason').value = ''; }

    // ============================================
    // RENDER SPECIFIC TAB
    // ============================================
    async function renderTab(tabName) {
        console.log(`🔄 Switching to tab: ${tabName}`);
        const bookings = await loadAllBookings();
        const profile = await loadUserProfile();

        let html = '';
        switch(tabName) {
            case 'dashboard':
                await renderDashboard();
                return;
            case 'upcoming':
                console.log(`📋 Rendering Upcoming Trips tab with ${bookings.upcoming?.length || 0} bookings`);
                html = `
                    <div class="section-card">
                        <div class="section-title"><i class="fas fa-calendar-alt"></i> Upcoming Trips</div>
                        ${renderBookingTable(bookings.upcoming, 'upcoming')}
                    </div>
                `;
                break;
            case 'bookings':
                console.log(`📋 Rendering Past Bookings tab with ${bookings.past?.length || 0} bookings`);
                html = `
                    <div class="section-card">
                        <div class="section-title"><i class="fas fa-history"></i> Past Bookings</div>
                        ${renderBookingTable(bookings.past, 'past')}
                    </div>
                `;
                break;
            case 'cancelled':
                console.log(`📋 Rendering Cancelled tab with ${bookings.cancelled?.length || 0} bookings`);
                html = `
                    <div class="section-card">
                        <div class="section-title"><i class="fas fa-ban"></i> Cancelled Bookings</div>
                        ${renderBookingTable(bookings.cancelled, 'cancelled')}
                    </div>
                `;
                break;
            case 'search':
                console.log('🔍 Rendering Search Flights tab');
                await loadAirports();
                const modifyData = sessionStorage.getItem('modifySearchData');
                let restoreData = null;
                if (modifyData) {
                    try {
                        restoreData = JSON.parse(modifyData);
                        sessionStorage.removeItem('modifySearchData');
                    } catch(e) {}
                }
                html = renderSearchFlights(restoreData);
                setTimeout(() => {
                    setupAirportInput('fromSearch');
                    setupAirportInput('toSearch');
                    const today = new Date().toISOString().split('T')[0];
                    if (!document.getElementById('departDateSearch').value) {
                        document.getElementById('departDateSearch').value = today;
                    }
                }, 100);
                break;
            case 'profile':
                console.log('👤 Rendering Profile tab');
                html = renderProfile(profile, bookings);
                break;
            default:
                await renderDashboard();
                return;
        }
        document.getElementById('appContainer').innerHTML = html;
        console.log(`✅ Tab ${tabName} rendered successfully`);
    }

    // ============================================
    // HANDLE MODIFY SEARCH REDIRECT
    // ============================================
    function handleModifySearchRedirect() {
        const shouldRedirect = sessionStorage.getItem('redirectToSearchTab');
        if (shouldRedirect === 'true') {
            sessionStorage.removeItem('redirectToSearchTab');
            setTimeout(() => {
                const searchTab = document.querySelector('.nav-item[data-tab="search"]');
                if (searchTab) {
                    searchTab.click();
                }
            }, 500);
        }
    }

    // ============================================
    // SWITCH TAB
    // ============================================
    async function switchTab(tabId) {
        console.log(`🖱️ Tab clicked: ${tabId}`);
        currentTab = tabId;
        document.querySelectorAll('.nav-item').forEach(el => {
            el.classList.remove('active');
            if (el.getAttribute('data-tab') === tabId) el.classList.add('active');
        });
        const titles = { dashboard: '📊 My Dashboard', upcoming: '🛫 Upcoming Trips', bookings: '📋 My Bookings', cancelled: '❌ Cancelled Bookings', search: '🔍 Search Flights', profile: '👤 My Profile' };
        document.getElementById('mainTitle').innerHTML = titles[tabId] || 'My Dashboard';
        if (tabId === 'logout') { logout(); return; }
        await renderTab(tabId);
    }

    function attachNavListeners() {
        document.querySelectorAll('.nav-item').forEach(item => {
            const tabId = item.getAttribute('data-tab');
            if (tabId) {
                item.removeEventListener('click', () => {});
                item.addEventListener('click', (e) => { e.preventDefault(); switchTab(tabId); });
            }
        });
    }

    // ============================================
    // STARS GENERATION
    // ============================================
    function generateStars() {
        const starsContainer = document.querySelector('.stars');
        if (!starsContainer) return;
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const r = Math.random();
            if (r > 0.7) star.classList.add('large');
            else if (r > 0.3) star.classList.add('medium');
            else star.classList.add('small');
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
        console.log('🚀 USER DASHBOARD INITIALIZING...');
        console.log('📍 API_BASE:', API_BASE);
        console.log('📍 Current URL:', window.location.href);

        generateStars();

        try {
            console.log('🔐 Checking authentication...');
            const profile = await fetchAPI(`${API_BASE}/user/api/profile`);
            if (!profile) {
                console.error('❌ Authentication failed, redirecting to signin...');
                window.location.href = '/signin';
                return;
            }
            console.log('✅ Authentication successful, user:', profile.email);
        } catch (error) {
            console.error('❌ Authentication error:', error);
            window.location.href = '/signin';
            return;
        }

        attachNavListeners();
        await renderDashboard();
        handleModifySearchRedirect();

        console.log('✅ USER DASHBOARD INITIALIZED SUCCESSFULLY');
    }

    // Expose functions globally
    window.viewBooking = viewBooking;
    window.openCancelModal = openCancelModal;
    window.confirmCancel = confirmCancel;
    window.closeModal = closeModal;
    window.closeCancelModal = closeCancelModal;
    window.openEditProfileModal = openEditProfileModal;
    window.closeEditProfileModal = closeEditProfileModal;
    window.saveProfileChanges = saveProfileChanges;
    window.switchTab = switchTab;
    window.quickSearchDashboard = quickSearchDashboard;
    window.continuePendingBooking = continuePendingBooking;
    window.performSearch = performSearch;
    window.swapLocations = swapLocations;
    window.logout = logout;

    window.addEventListener('load', init);

    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        const stars = document.querySelector('.stars');
        if (stars) stars.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
    });
</script>
</body>
</html>
