<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AirNova – Fly Beyond Dreams</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <style>
        /* Tumhara saara CSS yahan rahega - same as before */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 30%, #0f1429 60%, #050810 100%);
            position: relative;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 1s ease;
        }

        body.loaded {
            opacity: 1;
        }

        /* Stars and animations ka saara CSS */
        .stars, .twinkling {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #e6f2ff 60%, transparent 100%);
            border-radius: 50%;
            filter: brightness(1.2);
            will-change: transform, opacity;
        }

        .star.small {
            width: 1px;
            height: 1px;
            box-shadow: 0 0 2px rgba(255,255,255,0.9), 0 0 4px rgba(255,255,255,0.6);
        }

        .star.medium {
            width: 2.5px;
            height: 2.5px;
            box-shadow: 0 0 4px #fff, 0 0 8px rgba(173,216,230,0.7), 0 0 12px rgba(255,255,255,0.4);
        }

        .star.large {
            width: 3.5px;
            height: 3.5px;
            box-shadow: 0 0 6px #fff, 0 0 12px rgba(173,216,230,0.8), 0 0 18px rgba(135,206,235,0.6);
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; filter: brightness(0.8); }
            25% { opacity: 0.8; filter: brightness(1.2); }
            50% { opacity: 1; filter: brightness(1.6); }
            75% { opacity: 0.5; filter: brightness(1.0); }
        }
        .star {
            animation: starTwinkle 4s infinite ease-in-out;
        }

        .star.bright {
            animation: glowPulse 2s ease-in-out infinite !important;
            opacity: 0.95 !important;
        }
        @keyframes glowPulse {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 2px rgba(255,255,255,0.5)); }
            50% { filter: brightness(1.4) drop-shadow(0 0 10px white); }
        }

        .star.rapid {
            animation: rapidTwinkle 1.5s ease-in-out infinite !important;
        }
        @keyframes rapidTwinkle {
            0%,100%{ opacity:0.4; } 25%{ opacity:0.9; } 50%{ opacity:1; } 75%{ opacity:0.6; }
        }

        .shooting-star {
            position: absolute;
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            z-index: 3;
            filter: drop-shadow(0 0 4px white);
            opacity: 0;
        }
        @keyframes shootingStar {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateX(300px) translateY(300px) rotate(45deg); opacity: 0; }
        }
        .shooting-star.active {
            animation: shootingStar 2s ease-out forwards;
        }

        .flying-plane {
            position: absolute;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            z-index: 2;
            animation: fly 20s linear infinite;
            pointer-events: none;
        }
        .plane-1 { top: 20%; left: -10%; animation-delay: 0s; }
        .plane-2 { top: 70%; left: -10%; animation-delay: 10s; }
        .plane-3 { top: 40%; right: -10%; animation-direction: reverse; animation-delay: 5s; }
        @keyframes fly {
            0% { transform: translateX(-100px) scale(1); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateX(calc(100vw + 100px)) scale(1.2); opacity: 0; }
        }

        .login-container {
            position: fixed;
            top: clamp(10px, 3vw, 25px);
            right: clamp(10px, 3vw, 25px);
            z-index: 100;
        }
        .login-btn {
            position: relative;
            padding: clamp(6px, 1.8vw, 14px) clamp(14px, 4vw, 42px);
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            font-size: clamp(10px, 2.2vw, 14px);
            font-weight: 700;
            letter-spacing: clamp(1px, 1.2vw, 2.2px);
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4);
            white-space: nowrap;
        }
        .login-btn:hover {
            transform: translateY(-3px) translateX(3px);
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.12));
            box-shadow: 0 16px 48px rgba(255,255,255,0.2), inset 0 1px 0 rgba(255,255,255,0.5), 0 0 30px rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }
        .login-btn:active {
            transform: translateY(-2px) translateX(2px) scale(0.97);
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }
        .login-btn:hover::before { left: 100%; }
        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent 80%);
            pointer-events: none;
        }
        .login-icon {
            margin-right: 6px;
            font-size: 1.1em;
            display: inline-block;
            transition: all 0.4s;
        }
        .login-btn:hover .login-icon {
            transform: scale(1.3) rotate(15deg);
            filter: drop-shadow(0 0 8px white);
        }
        @keyframes buttonPulse {
            0%,100%{ box-shadow:0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4), 0 0 0 0 rgba(255,255,255,0.3); }
            50%{ box-shadow:0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4), 0 0 0 8px rgba(255,255,255,0); }
        }
        .login-btn:hover { animation: buttonPulse 2s infinite; }
        @keyframes ripple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }
        .login-btn.ripple-active::after { animation: ripple 0.6s ease-out; }

        .main-content {
            position: relative;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: clamp(12px, 4vh, 35px) clamp(8px, 3vw, 20px);
            text-align: center;
        }

        .logo {
            margin-bottom: clamp(6px, 2.5vh, 18px);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-20px); }
        }

        .logo-text {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #e6f2ff 25%, #fff 50%, #e6f2ff 75%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300% 100%;
            animation: gradientShift 4s ease infinite, glow 3s ease-in-out infinite;
            letter-spacing: 8px;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 60px rgba(255,255,255,0.3), 0 0 100px rgba(173,216,230,0.2);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
            line-height: 1;
            white-space: nowrap;
        }

        .tagline {
            font-size: 22px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            margin-top: 10px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 600;
            animation: taglineGlow 2.5s infinite;
            white-space: nowrap;
        }

        .quote-text {
            font-size: 38px;
            color: white;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 300;
            font-style: italic;
        }

        .quote-author {
            font-size: 17px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @media (max-width: 1440px) {
            .logo-text { font-size: 75px; letter-spacing: 7px; }
            .tagline { font-size: 20px; letter-spacing: 7px; }
            .quote-text { font-size: 34px; }
            .quote-author { font-size: 16px; }
        }

        @media (max-width: 1280px) {
            .logo-text { font-size: 65px; letter-spacing: 6px; }
            .tagline { font-size: 18px; letter-spacing: 6px; margin-bottom: 35px; }
            .quote-text { font-size: 30px; }
        }

        @media (max-width: 1024px) {
            .logo-text { font-size: 55px; letter-spacing: 5px; }
            .tagline { font-size: 16px; letter-spacing: 5px; margin-bottom: 30px; }
            .quote-text { font-size: 26px; }
            .quote-author { font-size: 15px; }
        }

        @media (max-width: 768px) {
            .logo-text { font-size: 45px; letter-spacing: 4px; }
            .tagline { font-size: 14px; letter-spacing: 4px; margin-bottom: 25px; }
            .quote-text { font-size: 22px; }
            .quote-author { font-size: 14px; }
            .quote-container { flex-direction: column; }
            .quote-card { text-align: center; }
            .quote-character { order: -1; }
        }

        @media (max-width: 600px) {
            .logo-text { font-size: 36px; letter-spacing: 3px; }
            .tagline { font-size: 12px; letter-spacing: 3px; margin-bottom: 20px; }
            .quote-text { font-size: 20px; }
            .quote-author { font-size: 13px; }
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 30px; letter-spacing: 2px; }
            .tagline { font-size: 11px; letter-spacing: 2px; margin-bottom: 18px; }
            .quote-text { font-size: 18px; line-height: 1.5; }
            .quote-author { font-size: 12px; }
            .quote-icon { font-size: 40px; }
        }

        @media (max-width: 400px) {
            .logo-text { font-size: 26px; letter-spacing: 1.5px; }
            .tagline { font-size: 10px; letter-spacing: 1.5px; margin-bottom: 15px; }
            .quote-text { font-size: 16px; }
            .quote-author { font-size: 11px; }
        }

        @media (max-width: 320px) {
            .logo-text { font-size: 22px; letter-spacing: 1px; }
            .tagline { font-size: 9px; letter-spacing: 1px; margin-bottom: 12px; }
            .quote-text { font-size: 14px; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }
        @keyframes glow {
            0%,100%{ filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)) drop-shadow(0 0 30px rgba(173,216,230,0.15)); }
            50%{ filter: drop-shadow(0 0 30px rgba(255,255,255,0.6)) drop-shadow(0 0 60px rgba(173,216,230,0.4)); }
        }
        @keyframes taglineGlow {
            0%,100%{ text-shadow:0 0 20px rgba(255,255,255,0.3), 0 0 40px rgba(173,216,230,0.15); opacity:0.85; }
            50%{ text-shadow:0 0 40px rgba(255,255,255,0.6), 0 0 80px rgba(173,216,230,0.4); opacity:1; }
        }

        .quote-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: clamp(15px, 5vw, 90px);
            justify-content: center;
            padding: 0 clamp(8px, 2.5vw, 35px) clamp(30px, 7vh, 70px);
            flex-wrap: wrap;
        }

        .quote-card {
            flex: 1 1 350px;
            max-width: 580px;
            min-width: 240px;
            text-align: left;
            animation: cardFloat 8s infinite alternate;
        }
        @keyframes cardFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        .quote-icon {
            font-size: clamp(28px, 7vw, 65px);
            color: rgba(255,255,255,0.7);
            margin-bottom: clamp(6px, 1.8vh, 22px);
            line-height: 0.8;
        }

        .quote-character {
            flex: 0 1 280px;
            min-width: 130px;
            max-width: 400px;
            display: flex;
            justify-content: center;
            animation: characterBounce 3s ease-in-out infinite;
        }
        @keyframes characterBounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-15px); }
        }

        .quote-character img {
            width: 100%;
            height: auto;
            max-width: 340px;
            min-width: 110px;
            object-fit: contain;
            filter: drop-shadow(0 15px 40px rgba(255,255,255,0.25));
            transition: transform 0.3s;
            background: transparent;
        }
        .quote-character:hover img {
            transform: scale(1.08) rotate(2deg);
            filter: drop-shadow(0 20px 50px rgba(255,255,255,0.4));
        }

        .quote-nav {
            display: flex;
            justify-content: center;
            gap: clamp(6px, 1.8vw, 16px);
            margin-top: clamp(25px, 5vh, 45px);
            width: 100%;
            flex-wrap: wrap;
        }

        .nav-dot {
            width: clamp(8px, 1.8vw, 15px);
            height: clamp(8px, 1.8vw, 15px);
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1.5px solid rgba(255,255,255,0.15);
        }
        .nav-dot.active {
            background: rgba(255,255,255,0.9);
            transform: scale(1.4);
            box-shadow: 0 0 25px white;
        }
        .nav-dot:hover {
            background: rgba(255,255,255,0.5);
            transform: scale(1.2);
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffb6c1, #87ceeb, #ffd700);
            background-size: 300% 100%;
            animation: loading 2s infinite;
            z-index: 1000;
        }
        @keyframes loading {
            0% { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }

        .nav-dot { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
<div class="loading-bar"></div>
<div class="stars"></div>
<div class="twinkling"></div>

<div class="flying-plane plane-1">✈️</div>
<div class="flying-plane plane-2">✈️</div>
<div class="flying-plane plane-3">✈️</div>

<div class="login-container">
    <button class="login-btn" onclick="handleLogin()">
        <span class="login-icon">✈️</span>
        Search Flights
    </button>
</div>

<div class="main-content">
    <div class="logo">
        <div class="logo-text">AIRNOVA</div>
        <div class="tagline">FLY BEYOND DREAMS</div>
    </div>

    <div class="quote-container">
        <div class="quote-card" id="quoteCard">
            <div class="quote-icon">"</div>
            <div class="quote-text" id="quoteText">
                The journey of a thousand miles begins with a single booking.
            </div>
            <div class="quote-author" id="quoteAuthor">
                - AirNova
            </div>
        </div>

        <div class="quote-character">
            <!-- THYMELEAF VERSION - AB YEH KAM KAREGA -->
            <img id="characterImage" th:src="@{/images/firstImage.png}" alt="Character" style="width: 100%; max-width: 300px;" />
        </div>
    </div>

    <div class="quote-nav" id="quoteNav">
        <div class="nav-dot active" onclick="changeQuote(0)"></div>
        <div class="nav-dot" onclick="changeQuote(1)"></div>
        <div class="nav-dot" onclick="changeQuote(2)"></div>
        <div class="nav-dot" onclick="changeQuote(3)"></div>
        <div class="nav-dot" onclick="changeQuote(4)"></div>
        <div class="nav-dot" onclick="changeQuote(5)"></div>
        <div class="nav-dot" onclick="changeQuote(6)"></div>
        <div class="nav-dot" onclick="changeQuote(7)"></div>
    </div>
</div>

<script th:inline="javascript">
    (function() {
        // ---------- STARFIELD GENERATION ----------
        function generateStars() {
            const starsContainer = document.querySelector('.stars');
            if (!starsContainer) return;
            const numberOfStars = 200;
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';

                const r = Math.random();
                if (r > 0.75) {
                    star.classList.add('large');
                    star.style.width = (Math.random() * 1.5 + 3) + 'px';
                    star.style.height = star.style.width;
                } else if (r > 0.4) {
                    star.classList.add('medium');
                    star.style.width = (Math.random() * 1.5 + 2) + 'px';
                    star.style.height = star.style.width;
                } else {
                    star.classList.add('small');
                    star.style.width = (Math.random() * 1 + 0.8) + 'px';
                    star.style.height = star.style.width;
                }

                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 4 + 2) + 's';
                star.style.opacity = Math.random() * 0.8 + 0.4;
                starsContainer.appendChild(star);
            }
            // bright stars
            for (let i = 0; i < 25; i++) {
                const bStar = document.createElement('div');
                bStar.className = 'star large ' + (Math.random() > 0.6 ? 'bright' : 'rapid');
                bStar.style.left = Math.random() * 100 + '%';
                bStar.style.top = Math.random() * 100 + '%';
                bStar.style.width = (Math.random() * 2.5 + 2.5) + 'px';
                bStar.style.height = bStar.style.width;
                bStar.style.opacity = 0.9;
                starsContainer.appendChild(bStar);
            }
        }

        function createShootingStars() {
            setInterval(() => {
                if (Math.random() > 0.6) {
                    const container = document.querySelector('.stars');
                    const shooting = document.createElement('div');
                    shooting.className = 'shooting-star';
                    shooting.style.left = Math.random() * 90 + '%';
                    shooting.style.top = Math.random() * 70 + '%';
                    container.appendChild(shooting);
                    setTimeout(() => shooting.classList.add('active'), 50);
                    setTimeout(() => shooting.remove(), 2500);
                }
            }, 2000);
        }

        // ---------- QUOTES ----------
        const quotes = [
            { text: "The sky is not the limit, it's just the beginning.", author: "AirNova" },
            { text: "Life is short and the world is wide. Book that flight.", author: "Wanderlust" },
            { text: "Every flight is a story written in the clouds.", author: "Captain's Log" },
            { text: "Not all classrooms have walls. Sometimes they have wings.", author: "Travel Wisdom" },
            { text: "The best view comes after the hardest climb.", author: "Happy Flyer" },
            { text: "Adventure is out there! Your seat is waiting.", author: "AirNova" },
            { text: "Let your dreams take flight. We'll handle the booking.", author: "AirNova Team" },
            { text: "Somewhere between takeoff and landing, we found ourselves.", author: "Frequent Flyer" }
        ];

        // ---------- THYMELEAF IMAGE PATHS ----------
        const imageList = [
            [[@{/images/firstImage.png}]],
            [[@{/images/secondImage.png}]],
            [[@{/images/thirdImage copy.png}]],
            [[@{/images/fourthImage.png}]],
            [[@{/images/fifthImage.png}]],
            [[@{/images/sixthImage.png}]],
            [[@{/images/seventhImage.png}]],
            [[@{/images/eightImage.png}]]
        ];

        let currentQuoteIndex = 0;

        window.changeQuote = function(index) {
            currentQuoteIndex = index % quotes.length;
            const q = quotes[currentQuoteIndex];
            document.getElementById('quoteText').textContent = q.text;
            document.getElementById('quoteAuthor').textContent = '- ' + q.author;

            const img = document.getElementById('characterImage');
            if (img) {
                img.src = imageList[currentQuoteIndex];
                console.log('Loading image:', imageList[currentQuoteIndex]);
            }

            const dots = document.querySelectorAll('.nav-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentQuoteIndex);
            });
        };

window.handleLogin = function() {
    const btn = document.querySelector('.login-btn');
    btn.classList.add('ripple-active');
    setTimeout(() => btn.classList.remove('ripple-active'), 600);
    btn.style.transform = 'scale(0.95)';
    setTimeout(() => {
        btn.style.transform = '';
        // ✅ Directly open search-flights.html without any login check
        window.location.href = '/flights/search';
    }, 300);
};

        setInterval(() => {
            currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
            changeQuote(currentQuoteIndex);
        }, 8000);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                currentQuoteIndex = (currentQuoteIndex - 1 + quotes.length) % quotes.length;
                changeQuote(currentQuoteIndex);
            } else if (e.key === 'ArrowRight') {
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                changeQuote(currentQuoteIndex);
            }
        });

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const stars = document.querySelector('.stars');
            const twinkling = document.querySelector('.twinkling');
            if (stars) stars.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            if (twinkling) twinkling.style.transform = `translate(${x * -20}px, ${y * -20}px)`;
        });

        window.addEventListener('load', () => {
            generateStars();
            createShootingStars();
            const random = Math.floor(Math.random() * quotes.length);
            changeQuote(random);
            document.body.classList.add('loaded');
        });
    })();
</script>

</body>
</html>
