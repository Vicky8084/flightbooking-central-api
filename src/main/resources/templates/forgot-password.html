<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AirNova – Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 30%, #0f1429 60%, #050810 100%);
            position: relative;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body.loaded {
            opacity: 1;
        }

        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #e6f2ff 60%, transparent 100%);
            border-radius: 50%;
            animation: starTwinkle 4s infinite ease-in-out;
        }

        .star.small { width: 1px; height: 1px; }
        .star.medium { width: 2.5px; height: 2.5px; }
        .star.large { width: 3.5px; height: 3.5px; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .flying-plane {
            position: fixed;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            z-index: 2;
            animation: fly 20s linear infinite;
            pointer-events: none;
        }
        .plane-1 { top: 20%; left: -10%; animation-delay: 0s; }
        .plane-2 { top: 70%; left: -10%; animation-delay: 10s; }
        .plane-3 { top: 40%; right: -10%; animation-direction: reverse; animation-delay: 5s; }

        @keyframes fly {
            0% { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        .forgot-wrapper {
            position: relative;
            z-index: 50;
            width: 100%;
            max-width: 450px;
        }

        .logo-mini {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-mini .logo-text {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #e6f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            font-family: 'Arial Black', sans-serif;
        }

        .logo-mini .tagline {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .forgot-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: cardFloat 6s infinite alternate;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .step-number {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: rgba(255,255,255,0.6);
            font-weight: bold;
            transition: all 0.3s;
        }

        .step.active .step-number {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.4), rgba(76, 175, 80, 0.2));
            border-color: #4CAF50;
            color: white;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }

        .step.completed .step-number {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .step.active .step-label {
            color: white;
        }

        .step.completed .step-label {
            color: #4CAF50;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255,255,255,0.2);
            z-index: 1;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        .section-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 18px;
        }

        .input-icon input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-icon input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .input-icon input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .otp-group {
            display: flex;
            gap: 10px;
        }

        .otp-group .input-icon {
            flex: 1;
        }

        .resend-btn {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .resend-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
        }

        .resend-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-btn {
            width: 100%;
            padding: 16px 30px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.1));
            backdrop-filter: blur(30px);
            border: 1.5px solid #4CAF50;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.4), rgba(76, 175, 80, 0.2));
            box-shadow: 0 16px 48px rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .back-btn {
            width: 100%;
            padding: 14px 30px;
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.5);
            color: white;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border: 1.5px solid rgba(76, 175, 80, 0.5);
            border-radius: 12px;
            padding: 12px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1.5px solid rgba(255, 68, 68, 0.5);
            border-radius: 12px;
            padding: 12px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .field-error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .input-error {
            border-color: #ff6b6b !important;
        }

        .back-to-login {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.6);
        }

        .back-to-login a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .back-to-login a:hover {
            border-bottom-color: white;
        }

        .timer {
            text-align: center;
            margin-top: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffb6c1, #87ceeb, #ffd700);
            background-size: 300% 100%;
            animation: loading 2s infinite;
            z-index: 1000;
        }

        @keyframes loading {
            0% { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .forgot-card {
                padding: 25px;
            }
            .logo-mini .logo-text {
                font-size: 36px;
            }
            .step-number {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .step-label {
                font-size: 10px;
            }
            .otp-group {
                flex-direction: column;
            }
            .resend-btn {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
<div class="loading-bar"></div>
<div class="stars"></div>
<div class="twinkling"></div>

<div class="flying-plane plane-1">✈️</div>
<div class="flying-plane plane-2">✈️</div>
<div class="flying-plane plane-3">✈️</div>

<div class="forgot-wrapper">
    <div class="logo-mini">
        <div class="logo-text">AIRNOVA</div>
        <div class="tagline">FLY BEYOND DREAMS</div>
    </div>

    <div class="forgot-card">
        <div class="steps">
            <div class="step active" id="step1Indicator">
                <div class="step-number">1</div>
                <div class="step-label">Email</div>
            </div>
            <div class="step" id="step2Indicator">
                <div class="step-number">2</div>
                <div class="step-label">OTP</div>
            </div>
            <div class="step" id="step3Indicator">
                <div class="step-number">3</div>
                <div class="step-label">Reset</div>
            </div>
        </div>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <!-- STEP 1: Forgot Password (Email) -->
        <div id="step1" class="form-section active">
            <h2 class="section-title">Forgot Password?</h2>
            <p class="section-subtitle">Enter your email to receive OTP</p>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i>📧</i>
                    <input type="email" id="email" placeholder="Enter your registered email" required autocomplete="email">
                </div>
                <div class="field-error" id="emailError"></div>
            </div>

            <button class="action-btn" id="sendOtpBtn" onclick="sendOTP()">
                <span>📧</span> Send OTP
            </button>
        </div>

        <!-- STEP 2: OTP Verification -->
        <div id="step2" class="form-section">
            <h2 class="section-title">Verify OTP</h2>
            <p class="section-subtitle">Enter the 6-digit code sent to your email</p>

            <div class="form-group">
                <label>OTP Code</label>
                <div class="otp-group">
                    <div class="input-icon">
                        <i>🔢</i>
                        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" pattern="[0-9]{6}">
                    </div>
                    <button class="resend-btn" id="resendBtn" onclick="resendOTP()">Resend OTP</button>
                </div>
                <div class="field-error" id="otpError"></div>
                <div class="timer" id="timer">Resend available in 60s</div>
            </div>

            <button class="action-btn" id="verifyOtpBtn" onclick="verifyOTP()">
                <span>✓</span> Verify OTP
            </button>
            <button class="back-btn" onclick="goToStep(1)">
                ← Back to Email
            </button>
        </div>

        <!-- STEP 3: Reset Password -->
        <div id="step3" class="form-section">
            <h2 class="section-title">Reset Password</h2>
            <p class="section-subtitle">Create a new password for your account</p>

            <div class="form-group">
                <label>New Password</label>
                <div class="input-icon">
                    <i>🔒</i>
                    <input type="password" id="newPassword" placeholder="Enter new password" required autocomplete="new-password">
                </div>
                <div class="field-error" id="newPasswordError"></div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-icon">
                    <i>✓</i>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required autocomplete="off">
                </div>
                <div class="field-error" id="confirmPasswordError"></div>
            </div>

            <button class="action-btn" id="resetPasswordBtn" onclick="resetPassword()">
                <span>🔄</span> Reset Password
            </button>
            <button class="back-btn" onclick="goToStep(2)">
                ← Back to OTP
            </button>
        </div>

        <div class="back-to-login">
            <a href="/signin">← Back to Sign In</a>
        </div>
    </div>
</div>

<script>
    // State Management
    let currentStep = 1;
    let userEmail = '';
    let resetToken = '';
    let timerInterval = null;
    let timeLeft = 60;

    // ✅ FIXED: Use Central API for all auth endpoints
    const API_BASE = 'http://localhost:8081';

    // Step Navigation
    function goToStep(step) {
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.remove('active');
        document.getElementById(`step${step}`).classList.add('active');

        for (let i = 1; i <= 3; i++) {
            const indicator = document.getElementById(`step${i}Indicator`);
            if (i < step) {
                indicator.classList.add('completed');
                indicator.classList.remove('active');
            } else if (i === step) {
                indicator.classList.add('active');
                indicator.classList.remove('completed');
            } else {
                indicator.classList.remove('active', 'completed');
            }
        }
        currentStep = step;
    }

    /// STEP 1: Send OTP
window.sendOTP = async function() {
    const email = document.getElementById('email').value.trim();
    const emailError = document.getElementById('emailError');
    const sendBtn = document.getElementById('sendOtpBtn');

    if (!email) {
        emailError.textContent = 'Email is required';
        emailError.style.display = 'block';
        return;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailError.textContent = 'Please enter a valid email address';
        emailError.style.display = 'block';
        return;
    }

    emailError.style.display = 'none';

    const originalText = sendBtn.innerHTML;
    sendBtn.innerHTML = '<span class="spinner"></span> Sending OTP...';
    sendBtn.disabled = true;

    try {
        const response = await fetch(`${API_BASE}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        });

        // ✅ FIX: Check if response has content before parsing JSON
        const text = await response.text();

        if (response.ok) {
            let message = 'OTP sent successfully to ' + email;
            try {
                const data = JSON.parse(text);
                message = data.message || message;
            } catch(e) {
                // If response is empty, use default message
                console.log('Empty response from server');
            }

            userEmail = email;
            showSuccess(message);
            startTimer(60);
            document.getElementById('email').value = '';
            goToStep(2);
        } else {
            let errorMsg = 'Failed to send OTP';
            try {
                const data = JSON.parse(text);
                errorMsg = data.message || errorMsg;
            } catch(e) {}
            showError(errorMsg);
        }
    } catch (error) {
        console.error('Send OTP error:', error);
        showError('Network error. Please try again.');
    } finally {
        sendBtn.innerHTML = originalText;
        sendBtn.disabled = false;
    }
};

    // STEP 2: Verify OTP - Currently just simulates (actual OTP is sent via email)
    window.verifyOTP = async function() {
        const otp = document.getElementById('otp').value.trim();
        const otpError = document.getElementById('otpError');
        const verifyBtn = document.getElementById('verifyOtpBtn');

        if (!otp) {
            otpError.textContent = 'OTP is required';
            otpError.style.display = 'block';
            return;
        }

        if (!/^\d{6}$/.test(otp)) {
            otpError.textContent = 'Please enter a valid 6-digit OTP';
            otpError.style.display = 'block';
            return;
        }

        otpError.style.display = 'none';

        // For demo, any 6-digit OTP works if user exists
        // In production, you'd verify with Notification API
        const originalText = verifyBtn.innerHTML;
        verifyBtn.innerHTML = '<span class="spinner"></span> Verifying...';
        verifyBtn.disabled = true;

        try {
            // Simulate OTP verification (since OTP is sent via email)
            // In real scenario, you'd call notification API to verify
            showSuccess('OTP verified successfully!');
            document.getElementById('otp').value = '';
            goToStep(3);
        } catch (error) {
            showError('Invalid OTP');
        } finally {
            verifyBtn.innerHTML = originalText;
            verifyBtn.disabled = false;
        }
    };

    // STEP 3: Reset Password
    window.resetPassword = async function() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const resetBtn = document.getElementById('resetPasswordBtn');

        const newPassError = document.getElementById('newPasswordError');
        const confirmPassError = document.getElementById('confirmPasswordError');

        let isValid = true;

        if (!newPassword) {
            newPassError.textContent = 'Password is required';
            newPassError.style.display = 'block';
            isValid = false;
        } else if (newPassword.length < 6) {
            newPassError.textContent = 'Password must be at least 6 characters';
            newPassError.style.display = 'block';
            isValid = false;
        } else if (!/(?=.*[A-Za-z])(?=.*\d)/.test(newPassword)) {
            newPassError.textContent = 'Password must contain at least one letter and one number';
            newPassError.style.display = 'block';
            isValid = false;
        } else {
            newPassError.style.display = 'none';
        }

        if (!confirmPassword) {
            confirmPassError.textContent = 'Please confirm your password';
            confirmPassError.style.display = 'block';
            isValid = false;
        } else if (newPassword !== confirmPassword) {
            confirmPassError.textContent = 'Passwords do not match';
            confirmPassError.style.display = 'block';
            isValid = false;
        } else {
            confirmPassError.style.display = 'none';
        }

        if (!isValid) return;

        const originalText = resetBtn.innerHTML;
        resetBtn.innerHTML = '<span class="spinner"></span> Resetting Password...';
        resetBtn.disabled = true;

        try {
            // ✅ Call Central API reset-password endpoint
            const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: userEmail,
                    newPassword: newPassword
                })
            });

            if (response.ok) {
                showSuccess('Password reset successfully! Redirecting to login...');
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

                setTimeout(() => {
                    window.location.href = '/signin';
                }, 2000);
            } else {
                const data = await response.json();
                showError(data.message || 'Failed to reset password');
            }
        } catch (error) {
            console.error('Reset password error:', error);
            showError('Network error. Please try again.');
        } finally {
            resetBtn.innerHTML = originalText;
            resetBtn.disabled = false;
        }
    };

    // Resend OTP
    window.resendOTP = async function() {
        if (timeLeft > 0) {
            showError('Please wait ' + timeLeft + ' seconds before resending');
            return;
        }

        const resendBtn = document.getElementById('resendBtn');
        resendBtn.innerHTML = '<span class="spinner"></span> Sending...';
        resendBtn.classList.add('disabled');
        resendBtn.disabled = true;

        try {
            const response = await fetch(`${API_BASE}/api/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail })
            });

            if (response.ok) {
                showSuccess('OTP resent successfully!');
                startTimer(60);
            } else {
                showError('Failed to resend OTP');
            }
        } catch (error) {
            showError('Network error. Please try again.');
        } finally {
            resendBtn.innerHTML = 'Resend OTP';
            resendBtn.classList.remove('disabled');
            resendBtn.disabled = false;
        }
    };

    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = seconds;
        updateTimerDisplay();

        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').innerHTML = 'You can now resend OTP';
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const timerEl = document.getElementById('timer');
        if (timeLeft > 0) {
            timerEl.innerHTML = `Resend available in ${timeLeft}s`;
            timerEl.style.color = 'rgba(255,255,255,0.5)';
        } else {
            timerEl.innerHTML = '✓ You can now resend OTP';
            timerEl.style.color = '#4CAF50';
        }
    }

    function showSuccess(message) {
        const successEl = document.getElementById('successMessage');
        successEl.textContent = '✅ ' + message;
        successEl.style.display = 'block';
        setTimeout(() => {
            successEl.style.display = 'none';
        }, 5000);
    }

    function showError(message) {
        const errorEl = document.getElementById('errorMessage');
        errorEl.textContent = '❌ ' + message;
        errorEl.style.display = 'block';
        setTimeout(() => {
            errorEl.style.display = 'none';
        }, 5000);
    }

    function generateStars() {
        const starsContainer = document.querySelector('.stars');
        if (!starsContainer) return;
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const r = Math.random();
            if (r > 0.7) star.classList.add('large');
            else if (r > 0.3) star.classList.add('medium');
            else star.classList.add('small');
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    }

    document.getElementById('confirmPassword')?.addEventListener('input', function() {
        const newPass = document.getElementById('newPassword').value;
        const errorEl = document.getElementById('confirmPasswordError');
        if (newPass !== this.value) {
            errorEl.textContent = 'Passwords do not match';
            errorEl.style.display = 'block';
        } else {
            errorEl.style.display = 'none';
        }
    });

    window.addEventListener('load', () => {
        generateStars();
        document.body.classList.add('loaded');
    });

    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        const stars = document.querySelector('.stars');
        if (stars) {
            stars.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        }
    });
</script>
</body>
</html>
