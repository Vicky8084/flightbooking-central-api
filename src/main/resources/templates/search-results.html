<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AirNova – Flight Search Results</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 30%, #0f1429 60%, #050810 100%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Stars Background */
        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #e6f2ff 60%, transparent 100%);
            border-radius: 50%;
            animation: starTwinkle 4s infinite ease-in-out;
        }

        .star.small { width: 1px; height: 1px; }
        .star.medium { width: 2.5px; height: 2.5px; }
        .star.large { width: 3.5px; height: 3.5px; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .flying-plane {
            position: fixed;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            z-index: 2;
            animation: fly 20s linear infinite;
            pointer-events: none;
        }
        .plane-1 { top: 20%; left: -10%; animation-delay: 0s; }
        .plane-2 { top: 70%; left: -10%; animation-delay: 10s; }
        .plane-3 { top: 40%; right: -10%; animation-direction: reverse; animation-delay: 5s; }

        @keyframes fly {
            0% { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .search-summary {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            color: white;
        }

        .modify-search-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modify-search-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .login-container {
            display: flex;
            gap: 10px;
        }

        .login-btn {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.1));
            border: 1px solid #4CAF50;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: rgba(76, 175, 80, 0.4);
            transform: translateY(-2px);
        }

        .user-name {
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            padding: 6px 15px;
            border-radius: 20px;
            color: #ff4444;
            cursor: pointer;
            font-size: 12px;
        }

        /* Main Content */
        .main-content {
            position: relative;
            z-index: 50;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Search Info Card */
        .search-info-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .route-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .route-destination {
            text-align: center;
            flex: 1;
        }

        .city-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .airport-code {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .route-arrow {
            font-size: 30px;
            color: #ffd700;
        }

        .date-info {
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }

        /* Filters */
        .filters-section {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .filter-group select, .filter-group input {
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }

        .apply-filter-btn {
            background: #4CAF50;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .results-count {
            font-size: 18px;
        }

        .sort-select {
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }

        /* Flight Cards */
        .flight-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .flight-card:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }

        .flight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .flight-number {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
        }

        .airline-name {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .flight-route {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .airport {
            text-align: center;
            flex: 1;
        }

        .airport-code {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .airport-city {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .flight-line {
            flex: 2;
            height: 2px;
            background: linear-gradient(90deg, #ffd700, #4CAF50);
            position: relative;
        }

        .flight-line::before {
            content: '✈️';
            position: absolute;
            left: 50%;
            top: -12px;
            transform: translateX(-50%);
            font-size: 14px;
        }

        .flight-time {
            text-align: center;
            margin-bottom: 15px;
        }

        .time {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .date {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        /* Fare Class Section */
        .fare-class-section {
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }

        .fare-class-title {
            font-size: 14px;
            font-weight: 600;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .fare-class-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .fare-option {
            flex: 1;
            min-width: 100px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .fare-option:hover {
            background: rgba(76, 175, 80, 0.2);
            transform: translateY(-2px);
        }

        .fare-option.selected {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.1));
            border-color: #4CAF50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }

        .fare-name {
            font-weight: 700;
            font-size: 14px;
            color: white;
        }

        .fare-price {
            font-size: 18px;
            font-weight: 700;
            color: #4CAF50;
            margin: 5px 0;
        }

        .fare-baggage {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }

        .flight-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .selected-fare-info {
            flex: 1;
        }

        .selected-fare-price {
            font-size: 28px;
            font-weight: 700;
            color: #4CAF50;
        }

        .selected-fare-baggage {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        .book-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            padding: 12px 35px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .book-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .no-flights {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 18px;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: white;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1001;
            max-width: 350px;
        }

        .toast.error {
            background: #f44336;
        }

        @media (max-width: 768px) {
            .flight-route { flex-direction: column; }
            .flight-line { width: 100%; margin: 10px 0; }
            .flight-details { flex-direction: column; text-align: center; }
            .fare-class-options { flex-direction: column; }
            .route-info { flex-direction: column; }
            .route-arrow { transform: rotate(90deg); }
        }
    </style>
</head>
<body>
<div class="stars"></div>
<div class="twinkling"></div>

<div class="flying-plane plane-1">✈️</div>
<div class="flying-plane plane-2">✈️</div>
<div class="flying-plane plane-3">✈️</div>

<div class="main-content">
    <!-- Header -->
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">✈️ AirNova</div>
        <div class="search-summary" id="searchSummary">Loading...</div>
        <div style="display: flex; gap: 10px;">
            <button class="modify-search-btn" onclick="window.location.href='/flights/search'">✏️ Modify Search</button>
            <div id="authSection"></div>
        </div>
    </div>

    <!-- Search Info Card -->
    <div class="search-info-card" id="searchInfoCard">
        <div class="route-info">
            <div class="route-destination">
                <div class="city-name" id="originCity">-</div>
                <div class="airport-code" id="originCode">-</div>
            </div>
            <div class="route-arrow">✈️ →</div>
            <div class="route-destination">
                <div class="city-name" id="destCity">-</div>
                <div class="airport-code" id="destCode">-</div>
            </div>
        </div>
        <div class="date-info" id="dateInfo">-</div>
    </div>

    <!-- Filters -->
    <div class="filters-section">
        <div class="filter-group">
            <label>✈️ Stops:</label>
            <select id="stopsFilter">
                <option value="all">All flights</option>
                <option value="direct">Direct only</option>
                <option value="1">1 stop</option>
                <option value="2">2+ stops</option>
            </select>
        </div>
        <div class="filter-group">
            <label>💰 Max Price:</label>
            <input type="number" id="maxPriceFilter" placeholder="Any" step="1000">
        </div>
        <div class="filter-group">
            <label>🕐 Departure:</label>
            <select id="departureTimeFilter">
                <option value="all">Any time</option>
                <option value="morning">Morning (00:00 - 11:59)</option>
                <option value="afternoon">Afternoon (12:00 - 17:59)</option>
                <option value="evening">Evening (18:00 - 23:59)</option>
            </select>
        </div>
        <button class="apply-filter-btn" onclick="applyFilters()">Apply Filters</button>
    </div>

    <!-- Results Header -->
    <div class="results-header">
        <div class="results-count" id="resultsCount">Loading flights...</div>
        <select class="sort-select" id="sortBy" onchange="sortFlights()">
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="time_asc">Departure: Earliest</option>
            <option value="duration_asc">Duration: Shortest</option>
        </select>
    </div>

    <!-- Flights List -->
    <div id="flightsList">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Searching flights...</p>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const API_BASE = 'http://localhost:8081';
    let fareClasses = [];
    let allFlights = [];
    let filteredFlights = [];
    let selectedFares = {};
    let currentUser = null;

    // ============================================
    // GET URL PARAMETERS
    // ============================================
    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        return {
            sourceCode: params.get('sourceCode') || params.get('fromCode'),
            destinationCode: params.get('destinationCode') || params.get('toCode'),
            travelDate: params.get('travelDate') || params.get('date'),
            sourceCity: params.get('sourceCity'),
            sourceName: params.get('sourceName'),
            destinationCity: params.get('destinationCity'),
            destinationName: params.get('destinationName'),
            passengers: parseInt(params.get('passengers')) || 1,
            seatClass: params.get('seatClass') || 'ECONOMY',
            includeConnecting: params.get('includeConnecting') !== 'false',
            maxPrice: params.get('maxPrice') ? parseFloat(params.get('maxPrice')) : null
        };
    }

    // ============================================
    // LOAD FARE CLASSES FROM DB
    // ============================================
    async function loadFareClasses() {
        try {
            const response = await fetch(`${API_BASE}/api/db/fare-classes`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            });

            if (response.ok) {
                fareClasses = await response.json();
                console.log('✅ Loaded', fareClasses.length, 'fare classes');
            } else {
                // Fallback default fare classes
                fareClasses = [
                    { code: 'LITE', name: 'Economy Lite', priceMultiplier: 0.9, cabinBaggageKg: 7, checkInBaggageKg: 15, extraBaggageRatePerKg: 500, mealIncluded: false, cancellationFee: 0, changeFee: 0, seatSelectionFree: false, priorityCheckin: false, priorityBoarding: false, loungeAccess: false },
                    { code: 'STANDARD', name: 'Economy Standard', priceMultiplier: 1.1, cabinBaggageKg: 7, checkInBaggageKg: 23, extraBaggageRatePerKg: 400, mealIncluded: true, cancellationFee: 1000, changeFee: 500, seatSelectionFree: true, priorityCheckin: false, priorityBoarding: false, loungeAccess: false },
                    { code: 'FLEX', name: 'Economy Flex', priceMultiplier: 1.5, cabinBaggageKg: 7, checkInBaggageKg: 30, extraBaggageRatePerKg: 300, mealIncluded: true, cancellationFee: 0, changeFee: 0, seatSelectionFree: true, priorityCheckin: true, priorityBoarding: true, loungeAccess: false },
                    { code: 'BUSINESS', name: 'Business Class', priceMultiplier: 2.5, cabinBaggageKg: 10, checkInBaggageKg: 40, extraBaggageRatePerKg: 200, mealIncluded: true, cancellationFee: 0, changeFee: 0, seatSelectionFree: true, priorityCheckin: true, priorityBoarding: true, loungeAccess: true },
                    { code: 'FIRST', name: 'First Class', priceMultiplier: 4.0, cabinBaggageKg: 12, checkInBaggageKg: 50, extraBaggageRatePerKg: 150, mealIncluded: true, cancellationFee: 0, changeFee: 0, seatSelectionFree: true, priorityCheckin: true, priorityBoarding: true, loungeAccess: true }
                ];
            }
        } catch (error) {
            console.error('Error loading fare classes:', error);
        }
    }

    // ============================================
    // SEARCH FLIGHTS
    // ============================================
    async function searchFlights() {
        const params = getUrlParams();

        if (!params.sourceCode || !params.destinationCode || !params.travelDate) {
            showToast('Invalid search parameters', true);
            window.location.href = '/flights/search';
            return;
        }

        updateSearchInfo(params);

        const searchRequest = {
            sourceCode: params.sourceCode.toUpperCase(),
            destinationCode: params.destinationCode.toUpperCase(),
            travelDate: params.travelDate,
            includeConnectingFlights: params.includeConnecting,
            seatClass: params.seatClass
        };

        if (params.maxPrice) searchRequest.maxPrice = params.maxPrice;

        console.log('🔍 Searching flights:', searchRequest);

        try {
            const response = await fetch(`${API_BASE}/api/db/flights/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(searchRequest)
            });

            const data = await response.json();

            if (response.ok) {
                allFlights = data;
                filteredFlights = [...allFlights];
                displayFlights(filteredFlights);
                updateResultsCount();
            } else {
                document.getElementById('flightsList').innerHTML = `<div class="no-flights">❌ ${data.message || 'No flights found'}</div>`;
            }
        } catch (error) {
            console.error('Search error:', error);
            document.getElementById('flightsList').innerHTML = `<div class="no-flights">❌ Network error: ${error.message}</div>`;
        }
    }

    // ============================================
    // UPDATE SEARCH INFO CARD
    // ============================================
    function updateSearchInfo(params) {
        const originCity = params.sourceCity || params.sourceCode;
        const destCity = params.destinationCity || params.destinationCode;

        document.getElementById('originCity').textContent = originCity || 'Departure';
        document.getElementById('originCode').textContent = params.sourceCode?.toUpperCase() || '???';
        document.getElementById('destCity').textContent = destCity || 'Arrival';
        document.getElementById('destCode').textContent = params.destinationCode?.toUpperCase() || '???';

        const date = new Date(params.travelDate);
        document.getElementById('dateInfo').innerHTML = `
            📅 ${date.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
            | 👥 ${params.passengers} Passenger(s)
            | 💺 ${params.seatClass}
        `;

        document.getElementById('searchSummary').innerHTML = `
            ${originCity || params.sourceCode} → ${destCity || params.destinationCode} | ${params.travelDate}
        `;
    }

    // ============================================
    // GET PRICE BREAKDOWN
    // ============================================
    async function getPriceBreakdown(flightId, seatClass, fareClassCode) {
        try {
            const response = await fetch(`${API_BASE}/api/db/flights/${flightId}/price-breakdown?seatClass=${seatClass}&fareClassCode=${fareClassCode}`, {
                method: 'GET',
                credentials: 'include'
            });
            if (response.ok) {
                return await response.json();
            }
        } catch (error) {
            console.error('Error fetching price breakdown:', error);
        }
        return null;
    }

    // ============================================
    // DIRECT FLIGHT HTML GENERATOR
    // ============================================
    function directFlightHtml(flight) {
        const basePrice = flight.currentPriceEconomy || flight.basePriceEconomy || 0;
        return `
            <div class="flight-card" data-flight-id="${flight.id}" data-base-price="${basePrice}">
                <div class="flight-header">
                    <div class="flight-number">${flight.flightNumber}</div>
                    <div class="airline-name">${flight.aircraft?.airline?.name || flight.airlineName || 'Airline'}</div>
                </div>
                <div class="flight-route">
                    <div class="airport">
                        <div class="airport-code">${flight.sourceAirport?.code || flight.sourceCode || 'N/A'}</div>
                        <div class="airport-city">${flight.sourceAirport?.city || flight.sourceCity || 'Departure'}</div>
                    </div>
                    <div class="flight-line"></div>
                    <div class="airport">
                        <div class="airport-code">${flight.destinationAirport?.code || flight.destCode || 'N/A'}</div>
                        <div class="airport-city">${flight.destinationAirport?.city || flight.destCity || 'Arrival'}</div>
                    </div>
                </div>
                <div class="flight-time">
                    <div class="time">${formatTime(flight.departureTime)} → ${formatTime(flight.arrivalTime)}</div>
                    <div class="date">${formatDate(flight.departureTime)}</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.5);">Duration: ${flight.duration || calculateDuration(flight.departureTime, flight.arrivalTime)} minutes</div>
                </div>

                <div class="fare-class-section" id="fare-section-${flight.id}">
                    <div class="fare-class-title">🎫 Select Fare Class</div>
                    <div class="fare-class-options" id="fare-options-${flight.id}">
                        ${renderFareOptions(flight, basePrice)}
                    </div>
                </div>

                <div class="flight-details">
                    <div class="selected-fare-info" id="selected-info-${flight.id}">
                        <div class="selected-fare-price">₹${Math.round(basePrice)}</div>
                        <div class="selected-fare-baggage">🎒 7kg Cabin | 🧳 15kg Checked</div>
                    </div>
                    <button class="book-btn" id="book-btn-${flight.id}" onclick="bookFlight(${flight.id})">Book Now</button>
                </div>
            </div>
        `;
    }

    // ============================================
    // RENDER FARE OPTIONS
    // ============================================
    function renderFareOptions(flight, basePrice) {
        return fareClasses.map(fare => {
            const finalPrice = Math.round(basePrice * fare.priceMultiplier);
            return `
                <div class="fare-option" id="fare-${flight.id}-${fare.code}" data-fare-code="${fare.code}" data-price="${finalPrice}">
                    <div class="fare-name">${fare.name}</div>
                    <div class="fare-price">₹${finalPrice}</div>
                    <div class="fare-baggage">🎒 ${fare.cabinBaggageKg}kg | 🧳 ${fare.checkInBaggageKg}kg</div>
                    <div class="fare-benefits" style="font-size: 10px; color: #ffd700;">
                        ${fare.mealIncluded ? '🍽️ Meal ' : ''}
                        ${fare.seatSelectionFree ? '💺 Seat ' : ''}
                        ${fare.cancellationFee === 0 ? '✅ Free Cancel' : `❌ ₹${fare.cancellationFee}`}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderFareOptionsForConnecting(flight, basePrice) {
        return fareClasses.map(fare => {
            const finalPrice = Math.round(basePrice * fare.priceMultiplier);
            return `
                <div class="fare-option" data-fare-code="${fare.code}" data-price="${finalPrice}" onclick="selectConnectingFare(this, ${finalPrice}, '${fare.code}')">
                    <div class="fare-name">${fare.name}</div>
                    <div class="fare-price">₹${finalPrice}</div>
                    <div class="fare-baggage">🎒 ${fare.cabinBaggageKg}kg | 🧳 ${fare.checkInBaggageKg}kg</div>
                </div>
            `;
        }).join('');
    }

    // ============================================
    // SELECT FARE CLASS
    // ============================================
    async function selectFareClass(flightId, fareCode) {
        console.log(`Selecting fare ${fareCode} for flight ${flightId}`);

        const params = getUrlParams();

        try {
            const breakdown = await getPriceBreakdown(flightId, params.seatClass, fareCode);

            if (breakdown) {
                document.querySelectorAll(`[id^="fare-${flightId}-"]`).forEach(opt => {
                    opt.classList.remove('selected');
                });
                const fareOption = document.getElementById(`fare-${flightId}-${fareCode}`);
                if (fareOption) fareOption.classList.add('selected');

                const selectedInfo = document.getElementById(`selected-info-${flightId}`);
                if (selectedInfo) {
                    selectedInfo.innerHTML = `
                        <div class="selected-fare-price">₹${breakdown.dynamicPrice || breakdown.fareClassPrice}</div>
                        <div class="selected-fare-baggage">
                            🎒 ${breakdown.baggageAllowance?.cabin || 7}kg Cabin |
                            🧳 ${breakdown.baggageAllowance?.checked || 15}kg Checked
                            ${breakdown.mealIncluded ? ' | 🍽️ Meal Included' : ''}
                        </div>
                        <div style="font-size: 11px; color: #ffd700; margin-top: 5px;">
                            ${breakdown.cancellationFee === 0 ? '✅ Free Cancellation' : `❌ Cancellation Fee: ₹${breakdown.cancellationFee}`}
                        </div>
                    `;
                }

                selectedFares[flightId] = {
                    fareCode: fareCode,
                    fareClass: breakdown,
                    finalPrice: breakdown.dynamicPrice || breakdown.fareClassPrice
                };

                const bookBtn = document.getElementById(`book-btn-${flightId}`);
                if (bookBtn) {
                    bookBtn.disabled = false;
                    bookBtn.style.opacity = '1';
                }

                showToast(`✅ ${breakdown.fareClassName || fareCode} selected!`);
            }
        } catch (error) {
            console.error('Error selecting fare class:', error);
        }
    }

    function selectConnectingFare(element, price, fareCode) {
        document.querySelectorAll('.fare-option').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');

        const parent = element.closest('.flight-card');
        const selectedInfo = parent.querySelector('[id^="selected-info-"]');
        if (selectedInfo) {
            selectedInfo.innerHTML = `
                <div class="selected-fare-price">₹${price}</div>
                <div class="selected-fare-baggage">Selected: ${fareCode}</div>
            `;
        }
    }

    // ============================================
    // BOOK FLIGHT
    // ============================================
    function bookFlight(flightId) {
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');

        if (!user.id) {
            sessionStorage.setItem('pendingBooking', JSON.stringify({
                flightId: flightId,
                fareCode: selectedFares[flightId]?.fareCode || 'STANDARD',
                fareDetails: selectedFares[flightId]?.fareClass,
                totalPrice: selectedFares[flightId]?.finalPrice,
                searchParams: getUrlParams()
            }));
            showToast('Please login to continue booking', false);
            setTimeout(() => {
                window.location.href = '/signin';
            }, 1500);
            return;
        }

        if (!selectedFares[flightId]) {
            showToast('❌ Please select a fare class first!', true);
            return;
        }

        window.location.href = `/booking?flightId=${flightId}&fareCode=${selectedFares[flightId].fareCode}`;
    }

    function bookConnectingFlight(segments) {
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');

        if (!user.id) {
            sessionStorage.setItem('pendingBooking', JSON.stringify({
                segments: segments,
                searchParams: getUrlParams()
            }));
            showToast('Please login to continue booking', false);
            setTimeout(() => {
                window.location.href = '/signin';
            }, 1500);
            return;
        }

        window.location.href = `/booking?segments=${encodeURIComponent(JSON.stringify(segments))}`;
    }

    // ============================================
    // DISPLAY FLIGHTS
    // ============================================
    function displayFlights(flights) {
        const container = document.getElementById('flightsList');
        const params = getUrlParams();

        if (!flights || flights.length === 0) {
            container.innerHTML = '<div class="no-flights">✈️ No flights found for this route. Try different dates or destinations.</div>';
            return;
        }

        container.innerHTML = flights.map(flight => {
            // Direct Flight
            if (flight.flightNumber) {
                return directFlightHtml(flight);
            }
            // Connecting Flight
            else if (flight.segments && flight.segments.length > 0) {
                const first = flight.segments[0];
                const last = flight.segments[flight.segments.length - 1];
                const totalPrice = flight.totalPrice || 0;
                const connectionType = flight.connectionType || 'NORMAL';
                const hubAirport = flight.hubAirport || '';
                const sameAirline = flight.sameAirline || false;
                const protectedConnection = flight.protectedConnection || false;

                let badgeHtml = '';
                if (connectionType === 'HUB') {
                    badgeHtml = `<div style="background: linear-gradient(135deg, #4CAF50, #45a049); color: white; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px; font-size: 12px;">
                                    ✈️ Hub Connection (via ${hubAirport}) - 5% OFF
                                </div>`;
                } else if (sameAirline) {
                    badgeHtml = `<div style="background: #2196F3; color: white; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px; font-size: 12px;">
                                    ✈️ Same Airline Connection - 3% OFF
                                </div>`;
                }

                let benefitsHtml = '<div style="margin-top: 10px; font-size: 11px; display: flex; flex-wrap: wrap; gap: 10px;">';
                if (protectedConnection) {
                    benefitsHtml += '<span style="color: #4CAF50;">✅ Protected Connection</span>';
                    benefitsHtml += '<span style="color: #4CAF50;">✅ Baggage Checked Through</span>';
                } else {
                    benefitsHtml += '<span style="color: #ff9800;">⚠️ Self-Transfer Required</span>';
                    benefitsHtml += '<span style="color: #ff9800;">⚠️ Baggage Re-check Needed</span>';
                }
                if (connectionType === 'HUB') {
                    benefitsHtml += '<span style="color: #ffd700;">⭐ Preferred Hub Route</span>';
                }
                benefitsHtml += '</div>';

                return `
                    <div class="flight-card" data-flight-id="conn-${Date.now()}" data-base-price="${totalPrice}">
                        <div class="flight-header">
                            <div class="flight-number">${flight.flightNumbers?.join(' → ') || 'Connecting Flight'}</div>
                            <div class="airline-name">${flight.airlines?.join(' → ') || 'Multiple Airlines'}</div>
                        </div>

                        ${badgeHtml}

                        <div class="flight-route">
                            <div class="airport">
                                <div class="airport-code">${flight.sourceCode || 'N/A'}</div>
                                <div class="airport-city">${flight.sourceCity || 'Departure'}</div>
                            </div>
                            <div class="flight-line"></div>
                            <div class="airport">
                                <div class="airport-code">${flight.destinationCode || 'N/A'}</div>
                                <div class="airport-city">${flight.destinationCity || 'Arrival'}</div>
                            </div>
                        </div>
                        <div class="flight-time">
                            <div class="time">${formatTime(first?.departureTime)} → ${formatTime(last?.arrivalTime)}</div>
                            <div class="date">${formatDate(first?.departureTime)}</div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.5);">⏱️ Total: ${flight.totalDuration || 0} min | Layover: ${flight.totalLayoverTime || 0} min</div>
                        </div>

                        <div class="fare-class-section">
                            <div class="fare-class-title">🎫 Select Fare Class</div>
                            <div class="fare-class-options">
                                ${renderFareOptionsForConnecting(flight, totalPrice)}
                            </div>
                        </div>

                        ${benefitsHtml}

                        <div class="flight-details">
                            <div class="selected-fare-info" id="selected-info-conn">
                                <div class="selected-fare-price">₹${Math.round(totalPrice)}</div>
                                <div class="selected-fare-baggage">🎒 7kg Cabin | 🧳 15kg Checked</div>
                            </div>
                            <button class="book-btn" onclick="bookConnectingFlight(${JSON.stringify(flight.segments).replace(/"/g, '&quot;')})">Book Now</button>
                        </div>
                        ${flight.layoverAirports?.length ? `<div style="margin-top: 10px; font-size: 12px; color: #ffd700;">🔄 ${flight.numberOfStops || flight.layoverAirports.length} stop(s) via ${flight.layoverAirports.join(' → ')}</div>` : ''}
                    </div>
                `;
            }
            return '';
        }).join('');

        // Attach fare selection handlers
        fareClasses.forEach(fare => {
            allFlights.forEach(flight => {
                if (flight.flightNumber) {
                    const element = document.getElementById(`fare-${flight.id}-${fare.code}`);
                    if (element) {
                        element.onclick = () => selectFareClass(flight.id, fare.code);
                    }
                }
            });
        });
    }

    // ============================================
    // FILTERS AND SORTING
    // ============================================
    function applyFilters() {
        const stopsFilter = document.getElementById('stopsFilter').value;
        const maxPrice = document.getElementById('maxPriceFilter').value;
        const departureTimeFilter = document.getElementById('departureTimeFilter').value;

        filteredFlights = allFlights.filter(flight => {
            if (stopsFilter !== 'all') {
                if (stopsFilter === 'direct') {
                    if (flight.segments && flight.segments.length > 1) return false;
                } else if (stopsFilter === '1') {
                    if (!flight.segments || flight.segments.length !== 2) return false;
                } else if (stopsFilter === '2') {
                    if (!flight.segments || flight.segments.length < 3) return false;
                }
            }

            if (maxPrice) {
                const price = flight.currentPriceEconomy || flight.basePriceEconomy || flight.totalPrice || 0;
                if (price > parseFloat(maxPrice)) return false;
            }

            if (departureTimeFilter !== 'all') {
                let departureHour = 0;
                if (flight.departureTime) {
                    departureHour = new Date(flight.departureTime).getHours();
                } else if (flight.segments && flight.segments[0]) {
                    departureHour = new Date(flight.segments[0].departureTime).getHours();
                }

                if (departureTimeFilter === 'morning' && (departureHour < 0 || departureHour >= 12)) return false;
                if (departureTimeFilter === 'afternoon' && (departureHour < 12 || departureHour >= 18)) return false;
                if (departureTimeFilter === 'evening' && (departureHour < 18 || departureHour >= 24)) return false;
            }

            return true;
        });

        sortFlights();
        displayFlights(filteredFlights);
        updateResultsCount();
    }

    function sortFlights() {
        const sortBy = document.getElementById('sortBy').value;

        filteredFlights.sort((a, b) => {
            switch(sortBy) {
                case 'price_asc':
                    const priceA = a.currentPriceEconomy || a.basePriceEconomy || a.totalPrice || 0;
                    const priceB = b.currentPriceEconomy || b.basePriceEconomy || b.totalPrice || 0;
                    return priceA - priceB;
                case 'price_desc':
                    const priceC = a.currentPriceEconomy || a.basePriceEconomy || a.totalPrice || 0;
                    const priceD = b.currentPriceEconomy || b.basePriceEconomy || b.totalPrice || 0;
                    return priceD - priceC;
                case 'time_asc':
                    let timeA = a.departureTime;
                    let timeB = b.departureTime;
                    if (!timeA && a.segments && a.segments[0]) timeA = a.segments[0].departureTime;
                    if (!timeB && b.segments && b.segments[0]) timeB = b.segments[0].departureTime;
                    return new Date(timeA) - new Date(timeB);
                case 'duration_asc':
                    const durA = a.duration || a.totalDuration || 0;
                    const durB = b.duration || b.totalDuration || 0;
                    return durA - durB;
                default:
                    return 0;
            }
        });

        displayFlights(filteredFlights);
    }

    function updateResultsCount() {
        const count = filteredFlights.length;
        document.getElementById('resultsCount').textContent = `✈️ ${count} flight${count !== 1 ? 's' : ''} found`;
    }

    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    function formatTime(dateTimeStr) {
        if (!dateTimeStr) return 'N/A';
        try {
            const date = new Date(dateTimeStr);
            return date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        } catch(e) { return 'N/A'; }
    }

    function formatDate(dateTimeStr) {
        if (!dateTimeStr) return 'N/A';
        try {
            const date = new Date(dateTimeStr);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        } catch(e) { return 'N/A'; }
    }

    function calculateDuration(departure, arrival) {
        if (!departure || !arrival) return 0;
        const start = new Date(departure);
        const end = new Date(arrival);
        return Math.round((end - start) / 60000);
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    // ============================================
    // AUTH SECTION
    // ============================================
    function updateAuthSection() {
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');
        const authSection = document.getElementById('authSection');

        if (user.id) {
            currentUser = user;
            authSection.innerHTML = `
                <div class="user-name">
                    <span>👤 ${user.fullName?.split(' ')[0] || 'User'}</span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            `;
        } else {
            authSection.innerHTML = `
                <button class="login-btn" onclick="window.location.href='/signin'">Sign In</button>
            `;
        }
    }

    async function logout() {
        try {
            await fetch(`${API_BASE}/api/auth/logout`, { method: 'POST', credentials: 'include' });
        } catch (error) {}
        sessionStorage.removeItem('user');
        localStorage.removeItem('user');
        window.location.href = '/signin';
    }

    // ============================================
    // GENERATE STARS
    // ============================================
    function generateStars() {
        const starsContainer = document.querySelector('.stars');
        if (!starsContainer) return;
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const r = Math.random();
            if (r > 0.7) star.classList.add('large');
            else if (r > 0.3) star.classList.add('medium');
            else star.classList.add('small');
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
        console.log('🚀 Initializing search results page...');
        generateStars();
        updateAuthSection();
        await loadFareClasses();
        await searchFlights();
    }

    window.addEventListener('load', init);

    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        const stars = document.querySelector('.stars');
        if (stars) stars.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
    });
</script>
</body>
</html>
