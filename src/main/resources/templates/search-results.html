<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AirNova – Flight Search Results</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 30%, #0f1429 60%, #050810 100%);
            font-family: 'Lato', sans-serif;
            color: #eef2ff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #e6f2ff 60%, transparent 100%);
            border-radius: 50%;
            animation: starTwinkle 4s infinite ease-in-out;
        }

        .star.small { width: 1px; height: 1px; }
        .star.medium { width: 2.5px; height: 2.5px; }
        .star.large { width: 3.5px; height: 3.5px; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .flying-plane {
            position: fixed;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            z-index: 2;
            animation: fly 20s linear infinite;
            pointer-events: none;
        }
        .plane-1 { top: 20%; left: -10%; animation-delay: 0s; }
        .plane-2 { top: 70%; left: -10%; animation-delay: 10s; }
        .plane-3 { top: 40%; right: -10%; animation-direction: reverse; animation-delay: 5s; }

        @keyframes fly {
            0% { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        .flights-header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .search-summary {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }

        .modify-search-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modify-search-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .auth-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .login-btn {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.1));
            border: 1px solid #4CAF50;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .user-name {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .logout-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            padding: 6px 15px;
            border-radius: 20px;
            color: #ff4444;
            cursor: pointer;
            font-size: 12px;
        }

        .main-container {
            position: relative;
            z-index: 50;
            max-width: 1280px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            gap: 24px;
        }

        .search-info-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .route-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .route-destination {
            text-align: center;
            flex: 1;
        }

        .city-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .airport-code {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .route-arrow {
            font-size: 30px;
            color: #ffd700;
        }

        .temp-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 14px;
            color: #ffd700;
        }

        .temp-info i {
            font-size: 16px;
        }

        .date-info {
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }

        .filters-sidebar {
            width: 280px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }

        .filter-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .clear-all {
            color: #ffd700;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .filter-section {
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 16px;
        }

        .filter-title {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .filter-title i {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
        }

        .filter-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #4CAF50;
        }

        .filter-option span {
            flex: 1;
        }

        .filter-option .count {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .price-range {
            padding: 10px 0;
        }

        .price-slider {
            width: 100%;
            margin: 15px 0;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            height: 4px;
            border-radius: 5px;
        }

        .price-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffd700;
            cursor: pointer;
        }

        .price-inputs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .price-inputs input {
            width: 50%;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 12px;
            text-align: center;
        }

        .time-slot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .time-slot input {
            width: 16px;
            height: 16px;
            accent-color: #4CAF50;
        }

        .time-slot .time-label {
            flex: 1;
            margin-left: 10px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }

        .time-slot .price-range-label {
            font-size: 12px;
            color: #ffd700;
            font-weight: 600;
        }

        .airline-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .airline-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            cursor: pointer;
        }

        .airline-item input {
            width: 16px;
            height: 16px;
            accent-color: #4CAF50;
        }

        .airline-name {
            flex: 1;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }

        .airline-price {
            font-size: 12px;
            font-weight: 600;
            color: #ffd700;
        }

        .results-section {
            flex: 1;
        }

        .results-header {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .results-count {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .sort-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sort-label {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .sort-select {
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }

        .flight-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 16px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .flight-card:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }

        .flight-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .airline-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .airline-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .airline-details h4 {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }

        .airline-details p {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .flight-route {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .route-point {
            text-align: center;
        }

        .route-time {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .route-date {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .route-airport {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
        }

        .route-duration {
            text-align: center;
            flex: 1;
            padding: 0 20px;
        }

        .duration-text {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .stops-text {
            font-size: 12px;
            color: #ffd700;
        }

        .flight-price-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .price-details {
            text-align: right;
        }

        .price-amount {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }

        .price-tax {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .view-price-btn {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: #1a1f2e;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-price-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255,215,0,0.3);
        }

        .connecting-badge {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #ffd700;
        }

        .layover-info {
            background: rgba(255,215,0,0.1);
            padding: 8px 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 12px;
            color: #ffd700;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-flights {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: rgba(255,255,255,0.7);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1001;
        }

        .toast.error {
            background: #f44336;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .filters-sidebar {
                width: 100%;
                position: static;
            }
            .flight-route {
                flex-direction: column;
                gap: 15px;
            }
            .route-duration {
                width: 100%;
                padding: 10px 0;
            }
            .flight-price-section {
                flex-direction: column;
                text-align: center;
            }
            .price-details {
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="twinkling"></div>

<div class="flying-plane plane-1">✈️</div>
<div class="flying-plane plane-2">✈️</div>
<div class="flying-plane plane-3">✈️</div>

<div class="flights-header">
    <div class="header-container">
        <div class="logo" onclick="window.location.href='/'">✈️ AirNova</div>
        <div class="search-summary" id="searchSummary">Loading...</div>
        <div style="display: flex; gap: 12px;">
            <button class="modify-search-btn" onclick="redirectToDashboardSearch()">✏️ Modify Search</button>
            <div id="authSection"></div>
        </div>
    </div>
</div>

<div class="main-container">
    <div class="filters-sidebar">
        <div class="filter-header">
            <h3>Filters</h3>
            <span class="clear-all" onclick="clearAllFilters()">Clear all</span>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleFilter(this)">
                <span>⭐ Popular Filters</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="filter-options" id="popularFilters">
                <label class="filter-option">
                    <input type="checkbox" value="1stop" onchange="applyFilters()">
                    <span>1 Stop</span>
                    <span class="count" id="count1Stop">0</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" value="morning" onchange="applyFilters()">
                    <span>Morning Departures (6 AM - 12 PM)</span>
                    <span class="count" id="countMorning">0</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" value="afternoon" onchange="applyFilters()">
                    <span>Afternoon Departures (12 PM - 6 PM)</span>
                    <span class="count" id="countAfternoon">0</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" value="evening" onchange="applyFilters()">
                    <span>Evening Departures (6 PM - 12 AM)</span>
                    <span class="count" id="countEvening">0</span>
                </label>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleFilter(this)">
                <span>💰 One Way Price</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="price-range">
                <input type="range" id="priceSlider" min="0" max="50000" step="500" value="50000" class="price-slider" oninput="updatePriceRange()">
                <div class="price-inputs">
                    <input type="number" id="minPrice" placeholder="Min" value="0" onchange="updatePriceSlider()">
                    <input type="number" id="maxPrice" placeholder="Max" value="50000" onchange="updatePriceSlider()">
                </div>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleFilter(this)">
                <span>🛑 Stops</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="filter-options">
                <label class="filter-option">
                    <input type="radio" name="stops" value="all" checked onchange="applyFilters()">
                    <span>All flights</span>
                </label>
                <label class="filter-option">
                    <input type="radio" name="stops" value="direct" onchange="applyFilters()">
                    <span>Non-stop</span>
                    <span class="count" id="countDirect">0</span>
                </label>
                <label class="filter-option">
                    <input type="radio" name="stops" value="1" onchange="applyFilters()">
                    <span>1 Stop</span>
                    <span class="count" id="count1StopRadio">0</span>
                </label>
                <label class="filter-option">
                    <input type="radio" name="stops" value="2plus" onchange="applyFilters()">
                    <span>2+ Stops</span>
                    <span class="count" id="count2Plus">0</span>
                </label>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleFilter(this)">
                <span>🕐 Departure Time</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="filter-options">
                <label class="time-slot">
                    <input type="checkbox" value="6-12" onchange="applyFilters()">
                    <span class="time-label">6 AM to 12 PM</span>
                    <span class="price-range-label" id="countDep6to12">0</span>
                </label>
                <label class="time-slot">
                    <input type="checkbox" value="12-18" onchange="applyFilters()">
                    <span class="time-label">12 PM to 6 PM</span>
                    <span class="price-range-label" id="countDep12to18">0</span>
                </label>
                <label class="time-slot">
                    <input type="checkbox" value="18-24" onchange="applyFilters()">
                    <span class="time-label">6 PM to 12 AM</span>
                    <span class="price-range-label" id="countDep18to24">0</span>
                </label>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleFilter(this)">
                <span>🛬 Arrival Time</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="filter-options">
                <label class="time-slot">
                    <input type="checkbox" value="arr-6-12" onchange="applyFilters()">
                    <span class="time-label">6 AM to 12 PM</span>
                    <span class="price-range-label" id="countArr6to12">0</span>
                </label>
                <label class="time-slot">
                    <input type="checkbox" value="arr-12-18" onchange="applyFilters()">
                    <span class="time-label">12 PM to 6 PM</span>
                    <span class="price-range-label" id="countArr12to18">0</span>
                </label>
                <label class="time-slot">
                    <input type="checkbox" value="arr-18-24" onchange="applyFilters()">
                    <span class="time-label">6 PM to 12 AM</span>
                    <span class="price-range-label" id="countArr18to24">0</span>
                </label>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleFilter(this)">
                <span>✈️ Airlines</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="airline-list" id="airlineList"></div>
        </div>
    </div>

    <div class="results-section">
        <div class="search-info-card" id="searchInfoCard">
            <div class="route-info">
                <div class="route-destination">
                    <div class="city-name" id="originCity">-</div>
                    <div class="airport-code" id="originCode">-</div>
                    <div class="temp-info" id="originTemp">
                        <i class="fas fa-thermometer-half"></i>
                        <span>Loading weather...</span>
                    </div>
                </div>
                <div class="route-arrow">✈️ →</div>
                <div class="route-destination">
                    <div class="city-name" id="destCity">-</div>
                    <div class="airport-code" id="destCode">-</div>
                    <div class="temp-info" id="destTemp">
                        <i class="fas fa-thermometer-half"></i>
                        <span>Loading weather...</span>
                    </div>
                </div>
            </div>
            <div class="date-info" id="dateInfo">-</div>
        </div>

        <div class="results-header">
            <div class="results-count" id="resultsCount">Loading flights...</div>
            <div class="sort-section">
                <span class="sort-label">Sorted By:</span>
                <select class="sort-select" id="sortBy" onchange="sortFlights()">
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="time_asc">Departure: Earliest</option>
                    <option value="duration_asc">Duration: Shortest</option>
                </select>
            </div>
        </div>

        <div id="flightsList">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Searching flights...</p>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const API_BASE = '';
    let fareClasses = [];
    let allFlights = [];
    let filteredFlights = [];
    let currentUser = null;

    const weatherData = {
        'DEL': { temp: 35, condition: '☀️ Sunny', icon: 'fa-sun' },
        'BOM': { temp: 32, condition: '🌤️ Partly Cloudy', icon: 'fa-cloud-sun' },
        'BLR': { temp: 27, condition: '☁️ Cloudy', icon: 'fa-cloud' },
        'COK': { temp: 30, condition: '🌧️ Rainy', icon: 'fa-cloud-rain' },
        'HYD': { temp: 33, condition: '☀️ Sunny', icon: 'fa-sun' },
        'CCU': { temp: 31, condition: '🌤️ Partly Cloudy', icon: 'fa-cloud-sun' },
        'MAA': { temp: 34, condition: '☀️ Sunny', icon: 'fa-sun' },
        'default': { temp: 28, condition: '🌤️ Mild', icon: 'fa-cloud-sun' }
    };

    function getWeather(cityCode) {
        return weatherData[cityCode] || weatherData['default'];
    }

    function updateTemperatureDisplay(sourceCode, destCode) {
        const sourceWeather = getWeather(sourceCode);
        const destWeather = getWeather(destCode);
        const originTemp = document.getElementById('originTemp');
        const destTemp = document.getElementById('destTemp');
        if (originTemp) originTemp.innerHTML = `<i class="fas ${sourceWeather.icon}"></i><span>${sourceWeather.temp}°C ${sourceWeather.condition}</span>`;
        if (destTemp) destTemp.innerHTML = `<i class="fas ${destWeather.icon}"></i><span>${destWeather.temp}°C ${destWeather.condition}</span>`;
    }

    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        return {
            sourceCode: params.get('sourceCode'),
            destinationCode: params.get('destinationCode'),
            travelDate: params.get('travelDate'),
            sourceCity: params.get('sourceCity'),
            destinationCity: params.get('destinationCity'),
            passengers: parseInt(params.get('passengers')) || 1,
            seatClass: params.get('seatClass') || 'ECONOMY',
            includeConnecting: params.get('includeConnecting') !== 'false',
            maxPrice: params.get('maxPrice') ? parseFloat(params.get('maxPrice')) : null
        };
    }

    async function loadFareClasses() {
        try {
            const response = await fetch(`${API_BASE}/api/db/fare-classes`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            });
            if (response.ok) {
                fareClasses = await response.json();
                console.log('✅ Fare classes loaded:', fareClasses.length);
            }
        } catch (error) {
            console.error('Error loading fare classes:', error);
        }
    }

    async function searchFlights() {
        const params = getUrlParams();
        console.log('🔍 Search params:', params);

        if (!params.sourceCode || !params.destinationCode || !params.travelDate) {
            showToast('Invalid search parameters', true);
            window.location.href = '/flights/search';
            return;
        }

        updateSearchInfo(params);
        updateTemperatureDisplay(params.sourceCode, params.destinationCode);

        const searchRequest = {
            sourceCode: params.sourceCode.toUpperCase(),
            destinationCode: params.destinationCode.toUpperCase(),
            travelDate: params.travelDate,
            includeConnectingFlights: params.includeConnecting,
            seatClass: params.seatClass
        };
        if (params.maxPrice) searchRequest.maxPrice = params.maxPrice;

        console.log('📤 Search request:', searchRequest);

        try {
            const response = await fetch(`${API_BASE}/api/db/flights/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(searchRequest)
            });

            console.log('📥 Response status:', response.status);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const data = await response.json();
            console.log('✅ Flights received:', data.length);

            if (response.ok) {
                allFlights = data;
                filteredFlights = [...allFlights];
                updateFilterCounts();
                displayFlights(filteredFlights);
                populateAirlinesFilter();
                updateResultsCount();
            } else {
                const flightsList = document.getElementById('flightsList');
                if (flightsList) flightsList.innerHTML = `<div class="no-flights">❌ ${data.message || 'No flights found'}</div>`;
            }
        } catch (error) {
            console.error('Search error:', error);
            const flightsList = document.getElementById('flightsList');
            if (flightsList) flightsList.innerHTML = `<div class="no-flights">❌ Network error: ${error.message}. Please check if server is running.</div>`;
            showToast('Failed to search flights. Please try again.', true);
        }
    }

    function updateSearchInfo(params) {
        const originCity = params.sourceCity || params.sourceCode;
        const destCity = params.destinationCity || params.destinationCode;
        const date = new Date(params.travelDate);

        const originCityEl = document.getElementById('originCity');
        const originCodeEl = document.getElementById('originCode');
        const destCityEl = document.getElementById('destCity');
        const destCodeEl = document.getElementById('destCode');
        const dateInfoEl = document.getElementById('dateInfo');
        const searchSummaryEl = document.getElementById('searchSummary');

        if (originCityEl) originCityEl.textContent = originCity || 'Departure';
        if (originCodeEl) originCodeEl.textContent = params.sourceCode?.toUpperCase() || '???';
        if (destCityEl) destCityEl.textContent = destCity || 'Arrival';
        if (destCodeEl) destCodeEl.textContent = params.destinationCode?.toUpperCase() || '???';

        if (dateInfoEl) dateInfoEl.innerHTML = `📅 ${date.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} | 💺 ${params.seatClass}`;

        if (searchSummaryEl) searchSummaryEl.innerHTML = `${originCity} → ${destCity} | ${params.travelDate} | ${params.passengers} Traveller | ${params.seatClass}`;
    }

    function updateFilterCounts() {
        let directCount = 0, oneStopCount = 0, twoPlusCount = 0;
        let morningCount = 0, afternoonCount = 0, eveningCount = 0;
        let dep6to12 = 0, dep12to18 = 0, dep18to24 = 0;
        let arr6to12 = 0, arr12to18 = 0, arr18to24 = 0;
        let airlinePrices = {};

        allFlights.forEach(flight => {
            const segments = flight.segments || [flight];
            const stops = segments.length - 1;
            let departureHour = 0, arrivalHour = 0;
            if (segments[0]?.departureTime) departureHour = new Date(segments[0].departureTime).getHours();
            if (segments[segments.length-1]?.arrivalTime) arrivalHour = new Date(segments[segments.length-1].arrivalTime).getHours();
            const price = flight.currentPriceEconomy || flight.basePriceEconomy || flight.totalPrice || 0;
            const airline = flight.aircraft?.airline?.name || flight.airlineName || (flight.airlines ? flight.airlines[0] : 'Airline');

            if (stops === 0) directCount++;
            else if (stops === 1) oneStopCount++;
            else twoPlusCount++;

            if (departureHour >= 6 && departureHour < 12) morningCount++;
            else if (departureHour >= 12 && departureHour < 18) afternoonCount++;
            else if (departureHour >= 18 || departureHour < 6) eveningCount++;

            if (departureHour >= 6 && departureHour < 12) dep6to12++;
            else if (departureHour >= 12 && departureHour < 18) dep12to18++;
            else if (departureHour >= 18 || departureHour < 6) dep18to24++;

            if (arrivalHour >= 6 && arrivalHour < 12) arr6to12++;
            else if (arrivalHour >= 12 && arrivalHour < 18) arr12to18++;
            else if (arrivalHour >= 18 || arrivalHour < 6) arr18to24++;

            if (!airlinePrices[airline]) airlinePrices[airline] = price;
            else airlinePrices[airline] = Math.min(airlinePrices[airline], price);
        });

        const safeSetText = (id, value) => {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        };

        safeSetText('countDirect', directCount);
        safeSetText('count1StopRadio', oneStopCount);
        safeSetText('count2Plus', twoPlusCount);
        safeSetText('countMorning', morningCount);
        safeSetText('countAfternoon', afternoonCount);
        safeSetText('countEvening', eveningCount);
        safeSetText('countDep6to12', dep6to12);
        safeSetText('countDep12to18', dep12to18);
        safeSetText('countDep18to24', dep18to24);
        safeSetText('countArr6to12', arr6to12);
        safeSetText('countArr12to18', arr12to18);
        safeSetText('countArr18to24', arr18to24);
        safeSetText('count1Stop', oneStopCount);

        window.airlinePrices = airlinePrices;
    }

    function populateAirlinesFilter() {
        const airlinesSet = new Set();
        allFlights.forEach(flight => {
            let airline = flight.aircraft?.airline?.name || flight.airlineName;
            if (!airline && flight.airlines) airline = flight.airlines[0];
            if (airline) airlinesSet.add(airline);
        });
        const airlineList = document.getElementById('airlineList');
        if (!airlineList) return;
        const sortedAirlines = Array.from(airlinesSet).sort();
        airlineList.innerHTML = sortedAirlines.map(airline => `
            <label class="airline-item">
                <input type="checkbox" value="${airline}" onchange="applyFilters()">
                <span class="airline-name">${airline}</span>
                <span class="airline-price">₹${Math.round(window.airlinePrices?.[airline] || 0)}</span>
            </label>
        `).join('');
    }

    function applyFilters() {
        const stopsRadio = document.querySelector('input[name="stops"]:checked');
        const stopsValue = stopsRadio ? stopsRadio.value : 'all';
        const popular1Stop = document.querySelector('input[value="1stop"]')?.checked || false;
        const popularMorning = document.querySelector('input[value="morning"]')?.checked || false;
        const popularAfternoon = document.querySelector('input[value="afternoon"]')?.checked || false;
        const popularEvening = document.querySelector('input[value="evening"]')?.checked || false;
        const minPrice = parseInt(document.getElementById('minPrice')?.value || 0);
        const maxPrice = parseInt(document.getElementById('maxPrice')?.value || 50000);

        const depTimes = [];
        if (document.querySelector('input[value="6-12"]')?.checked) depTimes.push('6-12');
        if (document.querySelector('input[value="12-18"]')?.checked) depTimes.push('12-18');
        if (document.querySelector('input[value="18-24"]')?.checked) depTimes.push('18-24');

        const arrTimes = [];
        if (document.querySelector('input[value="arr-6-12"]')?.checked) arrTimes.push('arr-6-12');
        if (document.querySelector('input[value="arr-12-18"]')?.checked) arrTimes.push('arr-12-18');
        if (document.querySelector('input[value="arr-18-24"]')?.checked) arrTimes.push('arr-18-24');

        const selectedAirlines = Array.from(document.querySelectorAll('#airlineList input[type="checkbox"]:checked')).map(cb => cb.value);

        filteredFlights = allFlights.filter(flight => {
            const segments = flight.segments || [flight];
            const stops = segments.length - 1;
            let departureHour = 0, arrivalHour = 0;
            if (segments[0]?.departureTime) departureHour = new Date(segments[0].departureTime).getHours();
            if (segments[segments.length-1]?.arrivalTime) arrivalHour = new Date(segments[segments.length-1].arrivalTime).getHours();
            const price = flight.currentPriceEconomy || flight.basePriceEconomy || flight.totalPrice || 0;
            let airline = flight.aircraft?.airline?.name || flight.airlineName;
            if (!airline && flight.airlines) airline = flight.airlines[0];

            if (stopsValue === 'direct' && stops !== 0) return false;
            if (stopsValue === '1' && stops !== 1) return false;
            if (stopsValue === '2plus' && stops < 2) return false;
            if (popular1Stop && stops !== 1) return false;
            if (popularMorning && (departureHour < 6 || departureHour >= 12)) return false;
            if (popularAfternoon && (departureHour < 12 || departureHour >= 18)) return false;
            if (popularEvening && (departureHour < 18 || departureHour >= 24) && departureHour !== 0) return false;
            if (price < minPrice || price > maxPrice) return false;

            if (depTimes.length > 0) {
                let match = false;
                if (depTimes.includes('6-12') && departureHour >= 6 && departureHour < 12) match = true;
                if (depTimes.includes('12-18') && departureHour >= 12 && departureHour < 18) match = true;
                if (depTimes.includes('18-24') && departureHour >= 18 && departureHour < 24) match = true;
                if (!match) return false;
            }

            if (arrTimes.length > 0) {
                let match = false;
                if (arrTimes.includes('arr-6-12') && arrivalHour >= 6 && arrivalHour < 12) match = true;
                if (arrTimes.includes('arr-12-18') && arrivalHour >= 12 && arrivalHour < 18) match = true;
                if (arrTimes.includes('arr-18-24') && arrivalHour >= 18 && arrivalHour < 24) match = true;
                if (!match) return false;
            }

            if (selectedAirlines.length > 0 && airline && !selectedAirlines.includes(airline)) return false;
            return true;
        });
        displayFlights(filteredFlights);
        updateResultsCount();
    }

    function clearAllFilters() {
        document.querySelectorAll('.filter-options input, #airlineList input, .time-slot input').forEach(input => {
            if (input.type === 'checkbox' || input.type === 'radio') input.checked = false;
        });
        const allStopsRadio = document.querySelector('input[name="stops"][value="all"]');
        if (allStopsRadio) allStopsRadio.checked = true;
        const minPrice = document.getElementById('minPrice');
        const maxPrice = document.getElementById('maxPrice');
        const priceSlider = document.getElementById('priceSlider');
        if (minPrice) minPrice.value = 0;
        if (maxPrice) maxPrice.value = 50000;
        if (priceSlider) priceSlider.value = 50000;
        applyFilters();
    }

    function updatePriceRange() {
        const slider = document.getElementById('priceSlider');
        const maxPrice = document.getElementById('maxPrice');
        if (slider && maxPrice) {
            maxPrice.value = slider.value;
            applyFilters();
        }
    }

    function updatePriceSlider() {
        const maxPrice = document.getElementById('maxPrice');
        const slider = document.getElementById('priceSlider');
        if (maxPrice && slider) {
            slider.value = maxPrice.value;
            applyFilters();
        }
    }

    function toggleFilter(element) {
        const options = element.nextElementSibling;
        if (options) {
            options.style.display = options.style.display === 'none' ? 'flex' : 'none';
            element.querySelector('i').classList.toggle('fa-chevron-down');
            element.querySelector('i').classList.toggle('fa-chevron-up');
        }
    }

    function sortFlights() {
        const sortBy = document.getElementById('sortBy')?.value || 'price_asc';
        filteredFlights.sort((a, b) => {
            const priceA = a.currentPriceEconomy || a.basePriceEconomy || a.totalPrice || 0;
            const priceB = b.currentPriceEconomy || b.basePriceEconomy || b.totalPrice || 0;
            const timeA = a.departureTime || (a.segments?.[0]?.departureTime);
            const timeB = b.departureTime || (b.segments?.[0]?.departureTime);
            const durA = a.duration || a.totalDuration || 0;
            const durB = b.duration || b.totalDuration || 0;
            switch(sortBy) {
                case 'price_asc': return priceA - priceB;
                case 'price_desc': return priceB - priceA;
                case 'time_asc': return new Date(timeA) - new Date(timeB);
                case 'duration_asc': return durA - durB;
                default: return 0;
            }
        });
        displayFlights(filteredFlights);
    }

    // ✅ FIXED: viewPrices - passes complete connecting flight object
    function viewPrices(flight) {
        console.log('✈️ viewPrices called with flight:', flight);
        const params = getUrlParams();

        if (!flight) {
            showToast('Invalid flight data', true);
            return;
        }

        // Check if it's a connecting flight (has segments array)
        if (flight.segments && flight.segments.length > 0) {
            console.log('🔗 Connecting flight detected with', flight.segments.length, 'segments');

            // Store the complete connecting flight data in sessionStorage
            sessionStorage.setItem('connectingFlightData', JSON.stringify(flight));

            // Redirect with connecting flight flag
            const redirectUrl = `/price-comparison?flightId=${flight.segments[0].id}&sourceCode=${params.sourceCode}&destinationCode=${params.destinationCode}&travelDate=${params.travelDate}&sourceCity=${params.sourceCity}&destinationCity=${params.destinationCity}&passengers=${params.passengers}&seatClass=${params.seatClass}&isConnecting=true&totalPrice=${flight.totalPrice}`;
            console.log('🔗 Redirecting to:', redirectUrl);
            window.location.href = redirectUrl;
        } else {
            // Direct flight
            console.log('✈️ Direct flight detected');
            const redirectUrl = `/price-comparison?flightId=${flight.id}&sourceCode=${params.sourceCode}&destinationCode=${params.destinationCode}&travelDate=${params.travelDate}&sourceCity=${params.sourceCity}&destinationCity=${params.destinationCity}&passengers=${params.passengers}&seatClass=${params.seatClass}`;
            console.log('✈️ Redirecting to:', redirectUrl);
            window.location.href = redirectUrl;
        }
    }

    function redirectToDashboardSearch() {
        const params = getUrlParams();
        const searchData = {
            sourceCode: params.sourceCode,
            destinationCode: params.destinationCode,
            travelDate: params.travelDate,
            sourceCity: params.sourceCity,
            destinationCity: params.destinationCity,
            passengers: params.passengers,
            seatClass: params.seatClass,
            includeConnecting: params.includeConnecting,
            maxPrice: params.maxPrice
        };
        sessionStorage.setItem('modifySearchData', JSON.stringify(searchData));
        sessionStorage.setItem('redirectToSearchTab', 'true');
        window.location.href = '/user-dashboard';
    }

    function displayFlights(flights) {
        const container = document.getElementById('flightsList');
        if (!container) return;

        if (!flights || flights.length === 0) {
            container.innerHTML = '<div class="no-flights">✈️ No flights found. Try different dates or destinations.</div>';
            return;
        }

        console.log('📊 Displaying flights:', flights.length);

        container.innerHTML = flights.map(flight => {
            if (flight.segments && flight.segments.length > 0) {
                return connectingFlightHtml(flight);
            } else {
                return directFlightHtml(flight);
            }
        }).join('');
    }

    function directFlightHtml(flight) {
        const basePrice = flight.currentPriceEconomy || flight.basePriceEconomy || 0;
        const flightJson = JSON.stringify(flight).replace(/'/g, "&apos;");

        return `
            <div class="flight-card">
                <div class="flight-card-header">
                    <div class="airline-info">
                        <div class="airline-icon">✈️</div>
                        <div class="airline-details">
                            <h4>${flight.aircraft?.airline?.name || flight.airlineName || 'Airline'}</h4>
                            <p>${flight.flightNumber}</p>
                        </div>
                    </div>
                </div>
                <div class="flight-route">
                    <div class="route-point">
                        <div class="route-time">${formatTime(flight.departureTime)}</div>
                        <div class="route-date">${formatDate(flight.departureTime)}</div>
                        <div class="route-airport">${flight.sourceAirport?.code || flight.sourceCode}</div>
                    </div>
                    <div class="route-duration">
                        <div class="duration-text">${flight.duration || calculateDuration(flight.departureTime, flight.arrivalTime)} min</div>
                        <div class="stops-text">Non-stop</div>
                    </div>
                    <div class="route-point">
                        <div class="route-time">${formatTime(flight.arrivalTime)}</div>
                        <div class="route-date">${formatDate(flight.arrivalTime)}</div>
                        <div class="route-airport">${flight.destinationAirport?.code || flight.destCode}</div>
                    </div>
                </div>
                <div class="flight-price-section">
                    <div class="price-details">
                        <div class="price-amount">₹${Math.round(basePrice)}</div>
                        <div class="price-tax">+ taxes</div>
                    </div>
                    <button class="view-price-btn" onclick='viewPrices(${flightJson})'>View Prices</button>
                </div>
            </div>
        `;
    }

    function connectingFlightHtml(flight) {
        const first = flight.segments[0];
        const last = flight.segments[flight.segments.length - 1];
        const totalPrice = flight.totalPrice || 0;
        const stops = flight.numberOfStops || flight.segments.length - 1;
        const stopsText = stops === 1 ? '1 Stop' : `${stops} Stops`;
        const layoverText = flight.layoverAirports ? `via ${flight.layoverAirports.join(' → ')}` : '';

        const flightJson = JSON.stringify(flight).replace(/'/g, "&apos;");

        return `
            <div class="flight-card">
                <div class="flight-card-header">
                    <div class="airline-info">
                        <div class="airline-icon">✈️</div>
                        <div class="airline-details">
                            <h4>${flight.airlines?.join(' → ') || 'Connecting Flight'}</h4>
                            <p>${flight.flightNumbers?.join(' → ')}</p>
                        </div>
                    </div>
                    <div class="connecting-badge">✈️ Connecting Flight (${stopsText})</div>
                </div>
                <div class="flight-route">
                    <div class="route-point">
                        <div class="route-time">${formatTime(first?.departureTime)}</div>
                        <div class="route-date">${formatDate(first?.departureTime)}</div>
                        <div class="route-airport">${flight.sourceCode}</div>
                    </div>
                    <div class="route-duration">
                        <div class="duration-text">Total: ${flight.totalDuration || 0} min</div>
                        <div class="stops-text">${stopsText}</div>
                    </div>
                    <div class="route-point">
                        <div class="route-time">${formatTime(last?.arrivalTime)}</div>
                        <div class="route-date">${formatDate(last?.arrivalTime)}</div>
                        <div class="route-airport">${flight.destinationCode}</div>
                    </div>
                </div>
                ${layoverText ? `<div class="layover-info">🔄 ${layoverText} | Layover: ${flight.totalLayoverTime || 0} min</div>` : ''}
                <div class="flight-price-section">
                    <div class="price-details">
                        <div class="price-amount">₹${Math.round(totalPrice)}</div>
                        <div class="price-tax">+ taxes</div>
                    </div>
                    <button class="view-price-btn" onclick='viewPrices(${flightJson})'>View Prices</button>
                </div>
            </div>
        `;
    }

    function formatTime(dateTimeStr) {
        if (!dateTimeStr) return 'N/A';
        try { const date = new Date(dateTimeStr); return date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }); } catch(e) { return 'N/A'; }
    }

    function formatDate(dateTimeStr) {
        if (!dateTimeStr) return 'N/A';
        try { const date = new Date(dateTimeStr); return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); } catch(e) { return 'N/A'; }
    }

    function calculateDuration(departure, arrival) {
        if (!departure || !arrival) return 0;
        const start = new Date(departure);
        const end = new Date(arrival);
        return Math.round((end - start) / 60000);
    }

    function updateResultsCount() {
        const count = filteredFlights.length;
        const resultsCount = document.getElementById('resultsCount');
        if (resultsCount) resultsCount.innerHTML = `✈️ ${count} flight${count !== 1 ? 's' : ''} found`;
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        if (toast) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 4000);
        }
    }

    function updateAuthSection() {
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');
        const authSection = document.getElementById('authSection');
        if (!authSection) return;
        if (user.id) {
            currentUser = user;
            authSection.innerHTML = `<div class="user-name"><span>👤 ${user.fullName?.split(' ')[0] || 'User'}</span><button class="logout-btn" onclick="logout()">Logout</button></div>`;
        } else {
            authSection.innerHTML = `<button class="login-btn" onclick="window.location.href='/signin'">Sign In</button>`;
        }
    }

    async function logout() {
        try { await fetch(`${API_BASE}/api/auth/logout`, { method: 'POST', credentials: 'include' }); } catch(error) {}
        sessionStorage.removeItem('user');
        localStorage.removeItem('user');
        window.location.href = '/signin';
    }

    function generateStars() {
        const starsContainer = document.querySelector('.stars');
        if (!starsContainer) return;
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const r = Math.random();
            if (r > 0.7) star.classList.add('large');
            else if (r > 0.3) star.classList.add('medium');
            else star.classList.add('small');
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    }

    async function init() {
        console.log('🚀 Initializing search results page...');
        generateStars();
        updateAuthSection();
        await loadFareClasses();
        await searchFlights();
    }

    window.viewPrices = viewPrices;
    window.clearAllFilters = clearAllFilters;
    window.applyFilters = applyFilters;
    window.updatePriceRange = updatePriceRange;
    window.updatePriceSlider = updatePriceSlider;
    window.toggleFilter = toggleFilter;
    window.sortFlights = sortFlights;
    window.redirectToDashboardSearch = redirectToDashboardSearch;
    window.logout = logout;

    window.addEventListener('load', init);

    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        const stars = document.querySelector('.stars');
        if (stars) stars.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
    });
</script>
</body>
</html>
